er stories, adopt a playful and curious attitude.\n\n**2. Planning**: Rules to formulate the team's relationship with business customers; maximize system value. Main players: development team and business customer.\n\n**3. Iterations to First Release**: Cycles of testing → feedback → change. Goal: run customer-written function tests at the end of each iteration.\n\n**4. Productionizing**: Product is released; may be improved by adding features.\n\n**5. Maintenance**: New features may be added; riskier suggestions considered; team members rotated.\n","zh":"**1. 探索**：组建团队、评估技能、考察潜在技术、尝试编写用户故事、保持好奇和开放的心态。\n\n**2. 规划**：制定敏捷团队与业务客户关系的规则；最大化系统价值。主要参与者：开发团队和业务客户。\n\n**3. 首次发布迭代**：测试→反馈→变更的循环。目标：每次迭代结束时运行客户编写的功能测试。\n\n**4. 产品化**：产品发布；可添加功能进行改进。\n\n**5. 维护**：可能添加新功能；考虑风险较高的建议；轮换团队成员。\n"},"page":29},{"title":{"en":"Understanding and Modeling Organizational Systems","zh":"理解与建模组织系统"},"body":{"en":"**Three Modeling Techniques**:\n1. **Context-Level Data Flow Diagrams (DFD)**: Dynamic modeling. Shows scope of system: what is included (processes) and what is external (entities). One process (0), external entities, major data flows.\n2. **Entity-Relationship Model (ERD)**: Static modeling. Shows entities and their relationships (one-to-one, one-to-many, many-to-many).\n3. **Use Case Modeling (UML)**: Functional modeling. Describes what the system does without describing how. Actors (external users/roles), use cases (tasks), relationships (communicates, includes, extends, generalizes). Accompanied by use case scenarios.\n\n**Use Case Relationships**:\n- **Communicates**: Actor connects to use case.\n- **Include (<<include>>)**: A use case contains behavior common to multiple use cases.\n- **Extend (<<extend>>)**: A use case handles exceptions from the basic use case.\n- **Generalizes**: One \"thing\" is more general than another.\n","zh":"**三种建模技术**：\n1. **上下文级数据流图（DFD）**：动态建模。显示系统范围：包含的内容（过程）和外部内容（实体）。一个过程（0）、外部实体、主要数据流。\n2. **实体-关系模型（ERD）**：静态建模。显示实体及其关系（一对一、一对多、多对多）。\n3. **用例建模（UML）**：功能建模。描述系统做什么而不描述如何做。参与者（外部用户/角色）、用例（任务）、关系（通讯、包含、扩展、泛化）。伴随有用例场景。\n\n**用例关系**：\n- **通讯**：参与者连接到用例。\n- **包含（<<include>>）**：一个用例包含多个用例共有的行为。\n- **扩展（<<extend>>）**：一个用例处理基本用例的异常。\n- **泛化**：一个\"事物\"比另一个更一般化。\n"},"page":37},{"title":{"en":"Project Management Fundamentals","zh":"项目管理基础"},"body":{"en":"**Project Management Activities**:\n- Project initiation: Assemble team, research business, discuss objectives with client.\n- Determining project feasibility: Technical, economic, operational (organizational), schedule, legal.\n- Activity planning and control: Work Breakdown Structure (WBS), time estimation (experience, analogies, three-point, function points, COCOMO II).\n- **Gantt Charts**: Visual representation of timing and duration of tasks; drawn to scale; good for end-user communication.\n- **PERT Diagrams**: Graphically depict tasks and interrelationships; useful when activities can be done in parallel; identifies critical path and slack time.\n\n**Work Breakdown Structure (WBS)**:\n- Decomposition from large ideas to manageable activities.\n- Product-oriented or process-oriented.\n\n**Time Estimation Techniques**:\n- Relying on experience\n- Using analogies (similar past projects)\n- Three-point estimation (optimistic, pessimistic, most likely)\n- Identifying function points (IFPUG standard)\n- COCOMO II (time estimation software)\n\n**PERT Diagram Example** — Analysis Phase of a Systems Project:\n\n| Activity | Predecessor | Duration (days) |\n|:---|:---|:---|\n| A. Conduct interviews | None | 3 |\n| B. Administer questionnaires | A | 4 |\n| C. Read company reports | None | 4 |\n| D. Analyze data flow | B, C | 8 |\n| E. Introduce prototype | B, C | 5 |\n| F. Observe reactions to prototype | E | 3 |\n| G. Perform cost-benefit analysis | D | 3 |\n| H. Prepare proposal | F, G | 2 |\n| I. Present proposal | H | 2 |\n\n**PERT Advantages**: Easy identification of precedence order, critical path and critical activities, slack time determination. Pseudo-activities (dummy activities) preserve logic.\n","zh":"**项目管理活动**：\n- 项目启动：组建团队、调研业务、与客户讨论目标。\n- 确定项目可行性：技术、经济、运营（组织）、进度、法律。\n- 活动计划与控制：工作分解结构（WBS）、时间估算（经验、类比、三点估算、功能点、COCOMO II）。\n- **甘特图**：任务时间和持续时间的可视化表示；按比例绘制；适合与最终用户沟通。\n- **PERT 图**：图形化描述任务及其相互关系；当活动可并行时有用；识别关键路径和松驰时间。\n\n**工作分解结构（WBS）**：\n- 从大的想法分解到可管理的活动。\n- 面向产品或面向过程。\n\n**时间估算技术**：\n- 依赖经验\n- 使用类比（类似过去项目）\n- 三点估算（乐观、悲观、最可能）\n- 识别功能点（IFPUG 标准）\n- COCOMO II（时间估算软件）\n\n**PERT 图示例**——系统项目分析阶段：\n\n| 活动 | 前置活动 | 持续时间（天） |\n|:---|:---|:---|\n| A. 进行访谈 | 无 | 3 |\n| B. 发放问卷 | A | 4 |\n| C. 阅读公司报告 | 无 | 4 |\n| D. 分析数据流 | B, C | 8 |\n| E. 引入原型 | B, C | 5 |\n| F. 观察对原型的反应 | E | 3 |\n| G. 执行成本效益分析 | D | 3 |\n| H. 准备建议书 | F, G | 2 |\n| I. 展示建议书 | H | 2 |\n\n**PERT 优势**：轻松识别优先级顺序、关键路径和关键活动、松驰时间。伪活动（虚拟活动）用于保持逻辑。\n"},"page":53}]},{"id":"07","title":{"en":"Information Gathering","zh":"信息收集"},"ref":"ref/07.Information_Gathering (1).pdf","blocks":[{"title":{"en":"Interactive Methods","zh":"交互式方法"},"body":{"en":"**Three Interactive Methods to Elicit Human Information Requirements**:\n1. **Interviewing**: Important for collecting data on human and system requirements. Reveals opinions, feelings, goals, HCI concerns.\n   - Question types: Open-ended, Closed, Bipolar, Probes\n   - Question structures: Pyramid (closed → open), Funnel (open → closed), Diamond (closed-open-closed)\n   - Preparation steps: Read background material, set objectives, decide whom to interview, prepare interviewee, decide question types/structure.\n   - Closing: Ask \"anything else?\", summarize, ask for next contacts, set future appointments, thank.\n2. **Joint Application Design (JAD)**: Replaces series of interviews with group sessions. Saves time, rapid development, improved user ownership. Requires large block of time, good preparation, conducive culture.\n3. **Questionnaires**: Reach many stakeholders efficiently, quantify opinions, prioritize features. Open-ended, closed/scale, ranking questions. Avoid bias, ensure reliability/validity.\n\n**Outcome of Information Requirement Analysis**: Requirements-Specification Document (需求说明书) containing: project overview, stakeholder analysis, functional requirements (prioritized use cases), non-functional requirements, business rules, data requirements, assumptions & constraints.\n","zh":"**三种获取人类信息需求的交互式方法**：\n1. **访谈**：收集人员和系统需求数据的重要方法。揭示意见、感受、目标、人机交互关注点。\n   - 问题类型：开放式、封闭式、两极式、追问\n   - 问题结构：金字塔（封闭→开放）、漏斗（开放→封闭）、钻石（封闭-开放-封闭）\n   - 准备步骤：阅读背景材料、设定目标、决定访谈对象、准备受访者、决定问题类型/结构。\n   - 结束：问\"还有什么要补充的吗？\"、总结、询问下一位联系人、安排后续约见、感谢。\n2. **联合应用设计（JAD）**：以小组会议取代系列访谈。节省时间、开发快速、提高用户主人翁感。需要大块时间、充分准备、有利的文化。\n3. **问卷调查**：高效接触众多利益相关者、量化意见、对功能进行优先级排序。开放式、封闭式/量表、排序问题。避免偏见、确保信度和效度。\n\n**信息需求分析的产出**：需求说明书，包含：项目概述、利益相关者分析、功能需求（优先级用例）、非功能需求、业务规则、数据需求、假设与约束。\n"},"page":6},{"title":{"en":"Interview Question Types and Structure","zh":"访谈问题类型与结构"},"body":{"en":"**Question Types with Examples**:\n\n| Type | Purpose | Example |\n|:---|:---|:---|\n| Open-Ended | Explore broad topics | \"What's your opinion of the current state of e-commerce in your firm?\" |\n| Closed | Get specific facts | \"How many calls does the call center receive monthly?\" |\n| Bipolar | Force a yes/no stance | \"Do you agree that e-commerce lacks security?\" |\n| Probes | Dig deeper | \"Why? Give an example. Tell me step by step what happens.\" |\n\n**Question Structures**:\n- **Pyramid** (Closed → Open): Warm up reluctant interviewees.\n- **Funnel** (Open → Closed): When interviewee feels emotional about topic.\n- **Diamond** (Closed → Open → Closed): Combines strengths of both; takes longer.\n\n**Interview Preparation Steps**:\n1. Read background material (org charts, existing documents, system screenshots).\n2. Establish interview objectives (what to learn).\n3. Decide whom to interview (operational → management → external users).\n4. Prepare the interviewee (send invitation with context and expectations).\n5. Decide question types and structure.\n\n**Closing the Interview**: Always ask \"anything else?\", summarize impressions, ask for next contacts, set future appointments, thank.\n","zh":"**问题类型与示例**：\n\n| 类型 | 目的 | 示例 |\n|:---|:---|:---|\n| 开放式 | 探索广泛话题 | \"您对公司当前的电商状况有何看法？\" |\n| 封闭式 | 获取具体事实 | \"呼叫中心每月收到多少电话？\" |\n| 两极式 | 强制是/否立场 | \"您是否同意电商缺乏安全性？\" |\n| 追问 | 深入挖掘 | \"为什么？举一个例子。逐步告诉我发生了什么。\" |\n\n**问题结构**：\n- **金字塔**（封闭→开放）：让不情愿的受访者热身。\n- **漏斗**（开放→封闭）：受访者对话题有情感投入时。\n- **钻石**（封闭→开放→封闭）：结合两者优势；耗时更长。\n\n**访谈准备步骤**：\n1. 阅读背景材料（组织结构图、现有文档、系统截图）。\n2. 确定访谈目标。\n3. 决定访谈对象（操作层→管理层→外部用户）。\n4. 准备受访者（发送包含背景和期望的邀请）。\n5. 决定问题类型和结构。\n\n**结束访谈**：总是问\"还有什么要补充的吗？\"、总结印象、询问下一位联系人、安排后续约见、感谢。\n"},"page":8},{"title":{"en":"AI-Based Development Tools","zh":"AI 开发工具"},"body":{"en":"**1. AI Code Assistants / IDE Plugins**:\n- Real-time, editor-integrated tools for inline code completion and lightweight code generation.\n- **GitHub Copilot**: AI pair programmer providing real-time code suggestions in VS Code, JetBrains, etc.\n- **Cursor**: AI-first code editor with built-in chat, refactoring, and context-aware suggestions.\n\n**2. Autonomous Coding Agents / CLI Tools**:\n- Standalone, multi-step agents that explore files, refactor codebases, run tests, and complete projects end-to-end.\n- **Claude Code**: Anthropic's CLI agent for iterative, multi-file tasks with strong reasoning.\n- **OpenCode**: Open-source CLI coding agent for autonomous development workflows.\n\n**3. AI Agent Orchestration / Workflow Frameworks**:\n- Platforms for managing AI agent sessions, skills, tools, and collaboration.\n- **OpenClaw**: Manages sessions, sub-agents, skills, tools, and memory; enables multi-agent collaboration.\n- **Hermes**: For repetitive, structured tasks with consistent users/teams.\n","zh":"**1. AI 代码助手/IDE 插件**：\n- 编辑器集成的实时工具，提供行内代码补全和轻量级代码生成。\n- **GitHub Copilot**：AI 结对程序员，在 VS Code、JetBrains 等 IDE 中提供实时代码建议。\n- **Cursor**：AI 优先的代码编辑器，内置聊天、重构和上下文感知建议。\n\n**2. 自主编程智能体/CLI 工具**：\n- 独立的多步骤智能体，可探索文件、重构代码库、运行测试、端到端完成项目。\n- **Claude Code**：Anthropic 的 CLI 智能体，擅长迭代式多文件任务。\n- **OpenCode**：开源 CLI 编程智能体，用于自主开发工作流。\n\n**3. AI 智能体编排/工作流框架**：\n- 管理 AI 智能体会话、技能、工具和协作的平台。\n- **OpenClaw**：管理会话、子智能体、技能、工具和记忆；支持多智能体协作。\n- **Hermes**：用于重复性、结构化任务，面向一致的团队/用户。\n"},"page":22},{"title":{"en":"Unobtrusive Methods","zh":"无干扰方法"},"body":{"en":"**Unobtrusive Methods**: Techniques for gathering information without direct interaction with stakeholders. Reveal actual vs. stated processes, hidden patterns.\n- **Sampling**: Select representative subset from population. Methods: simple random, stratified, systematic, purposive.\n- **Quantitative Document Analysis**: Extract numerical patterns from existing records (Excel logs, email metadata, system logs).\n- **Qualitative Document Analysis**: Understand context, meaning, narratives (email threads, meeting minutes, error reports).\n- **Text Analytics**: Extract themes, sentiments, concepts from text data (open-ended survey responses, comments, emails).\n- **Observation – Analyst's Playscript**: Record decision-makers' actions in real-time using action verbs table.\n- **STROBE (Structured Observation of the Environment)**: Infer characteristics from physical/digital workspace (workspace layout, digital-tool placement, props, external information sources, lighting/color, clothing/appearance).\n\n**Data Triangulation**: Combine multiple unobtrusive sources to confirm findings and prioritize requirements.\n","zh":"**无干扰方法**：无需与利益相关者直接交互的信息收集技术。揭示实际流程与陈述流程的差异、隐藏模式。\n- **抽样**：从总体中选择代表性子集。方法：简单随机、分层、系统、目的性。\n- **定量文档分析**：从现有记录中提取数字模式（Excel 日志、邮件元数据、系统日志）。\n- **定性文档分析**：理解上下文、意义、叙事（邮件线程、会议记录、错误报告）。\n- **文本分析**：从文本数据中提取主题、情感、概念（开放式调查回答、评论、邮件）。\n- **观察——分析师剧本**：使用动作动词表实时记录决策者的行动。\n- **STROBE（结构化环境观察）**：从物理/数字工作空间中推断特征（工作空间布局、数字工具放置、道具、外部信息来源、照明/颜色、服装/外表）。\n\n**数据三角验证**：结合多种无干扰来源以确认发现并对需求进行优先级排序。\n"},"page":25}]},{"id":"08","title":{"en":"Process Modeling (I)","zh":"流程建模（一）"},"ref":"ref/08.Process_Modeling_1 (1).pdf","blocks":[{"title":{"en":"Agile Modeling and Prototyping","zh":"敏捷建模与原型开发"},"body":{"en":"**Prototyping**: Information-gathering technique to seek user reactions, suggestions, innovations, revision plans.\n- **Types of Prototypes**:\n  - Patched-up prototype: Works but is inefficient; all features, rough implementation.\n  - Nonoperational prototype: Scale model; tests certain design aspects; input/output only.\n  - First-of-a-series prototype: Completely operational pilot; useful for multiple installations.\n  - Selected features prototype: Includes some essential features; built in modules.\n\n**Agile Modeling Values and Principles**:\n- Values: Communication, Simplicity, Feedback, Courage.\n- Principles: Satisfy customer through working software, embrace change, deliver incrementally, daily collaboration, trust motivated individuals, face-to-face conversation, concentrate on working software, sustainable development, mindful design, self-organizing teams, rapid feedback, quality, adjust behavior, simplicity.\n\n**Scrum Framework**:\n- Roles: Product Owner, Scrum Master, Developers.\n- Artifacts: Product Backlog, Sprint Backlog, Increment.\n- Events: Sprint Planning, Daily Scrum, Sprint Review, Sprint Retrospective.\n\n**DevOps**: Set of practices and tools that automates and integrates processes between software development and IT teams.\n","zh":"**原型开发**：用于寻求用户反应、建议、创新和修订计划的信息收集技术。\n- **原型类型**：\n  - 拼凑型原型：可用但效率低；功能齐全、实现粗糙。\n  - 非操作原型：比例模型；测试特定设计方面；仅输入/输出。\n  - 首系列原型/示范原型：完全可操作的试点；适用于多个安装。\n  - 选择性功能原型：包含部分基本功能；模块化构建。\n\n**敏捷建模的价值观与原则**：\n- 价值观：沟通、简洁、反馈、勇气。\n- 原则：通过可工作的软件满足客户、拥抱变化、增量交付、日常协作、信任积极个体、面对面沟通、专注于可工作软件、可持续发展、用心设计、自组织团队、快速反馈、质量、调整行为、简洁。\n\n**Scrum 框架**：\n- 角色：产品负责人、Scrum 主管、开发人员。\n- 工件：产品待办列表、冲刺待办列表、增量。\n- 事件：冲刺规划、每日站会、冲刺评审、冲刺回顾。\n\n**DevOps**：自动化和集成软件开发与 IT 团队之间流程的实践和工具集合。\n"},"page":4},{"title":{"en":"Scrum in Detail","zh":"Scrum 详解"},"body":{"en":"Scrum is founded on empirical process control theory with three pillars:\n- **Transparency**: Process and work must be visible.\n- **Inspection**: Frequent inspection of artifacts and progress.\n- **Adaptation**: Adjust process when it deviates from acceptable limits.\n\n**Roles**:\n- **Product Owner**: Represents stakeholders; manages Product Backlog; maximizes value.\n- **Scrum Master**: Coaches team; removes impediments; ensures Scrum is understood.\n- **Developers**: Cross-functional, self-organizing; deliver potentially releasable Increment each Sprint.\n\n**Artifacts**:\n- **Product Backlog**: Ordered list of everything needed; single source of work.\n- **Sprint Backlog**: Selected items + plan for delivering them.\n- **Increment**: Usable, working product produced by the end of sprint.\n\n**Events**:\n- **Sprint Planning**: Define what will be done (max 8 hours for 1-month sprint).\n- **Daily Scrum**: 15-minute daily stand-up to align progress.\n- **Sprint Review**: Demo work to stakeholders for feedback.\n- **Sprint Retrospective**: Reflect on process and create improvement plan.\n","zh":"Scrum 建立在经验过程控制理论之上，三大支柱：\n- **透明性**：过程和所做工作必须可见。\n- **检视**：频繁检查工件和进展。\n- **调适**：当过程偏离可接受限度时进行调整。\n\n**角色**：\n- **产品负责人**：代表利益相关者；管理产品待办列表；最大化价值。\n- **Scrum 主管**：指导团队；消除障碍；确保 Scrum 被正确理解和执行。\n- **开发人员**：跨职能、自组织；每个冲刺交付潜在可发布增量。\n\n**工件**：\n- **产品待办列表**：所需内容的排序列表；唯一工作来源。\n- **冲刺待办列表**：选中的条目 + 交付计划。\n- **增量**：冲刺结束时产生的可用、可工作的产品。\n\n**事件**：\n- **冲刺规划**：定义将要做什么（1 个月冲刺最多 8 小时）。\n- **每日站会**：15 分钟每日同步进展。\n- **冲刺评审**：向利益相关者展示工作以获取反馈。\n- **冲刺回顾**：反思过程并制定改进计划。\n"},"page":12},{"title":{"en":"Data Flow Diagrams","zh":"数据流图"},"body":{"en":"**Data Flow Diagram (DFD)**: Graphically characterizes data processes and flows in a business system. Depicts system inputs, processes, outputs.\n\n**Basic Symbols**:\n- Process (rounded rectangle)\n- Data flow (arrow)\n- Data store (open-ended rectangle)\n- External entity (square or rectangle)\n\n**Basic Rules**:\n- Must have at least one process.\n- No freestanding objects.\n- Process must have both input and output data flow.\n- Data store must connect to at least one process.\n- External entities should not connect to each other.\n\n**Developing DFDs – Top-Down Approach**:\n1. Create Context Diagram (highest level; one process numbered 0; all external entities and major data flows)\n2. Draw Diagram 0 (next level; up to 9 processes; major data stores)\n3. Create Child Diagrams (explode each process; lower level number = parent process number; primitive process = not exploded)\n4. Check for errors\n5. Develop physical DFD from logical DFD\n6. Partition the physical DFD\n\n**Logical vs. Physical DFD**:\n- Logical: how business operates (business activities)\n- Physical: how system will be implemented (programs, modules, manual procedures, physical files)\n\n**Event Modeling**: Input flow from external entity is a trigger that starts process activities. Event response table maps events to triggers, activities, responses, destinations.\n\n**Partitioning**: Divide DFD into collections of manual procedures and computer programs based on: different user groups, timing, similar tasks, efficiency, consistency of data, security.\n","zh":"**数据流图（DFD）**：图形化表征业务系统中的数据过程和流。描绘系统输入、过程、输出。\n\n**基本符号**：\n- 过程（圆角矩形）\n- 数据流（箭头）\n- 数据存储（开口矩形）\n- 外部实体（正方形或矩形）\n\n**基本规则**：\n- 必须至少有一个过程。\n- 不能有独立对象。\n- 过程必须有输入和输出数据流。\n- 数据存储必须连接到至少一个过程。\n- 外部实体不应相互连接。\n\n**开发 DFD——自顶向下方法**：\n1. 创建上下文图（最高层；一个过程编号为0；所有外部实体和主要数据流）\n2. 绘制图0（下一层；最多9个过程；主要数据存储）\n3. 创建子图（展开每个过程；子图编号 = 父过程编号；原语过程 = 未展开）\n4. 检查错误\n5. 从逻辑 DFD 开发物理 DFD\n6. 划分物理 DFD\n\n**逻辑 DFD 与物理 DFD**：\n- 逻辑：业务如何运作（业务活动）\n- 物理：系统将如何实施（程序、模块、手工流程、物理文件）\n\n**事件建模**：来自外部实体的输入流是启动过程活动的触发器。事件响应表将事件映射到触发器、活动、响应、目的地。\n\n**划分**：根据不同用户组、时机、类似任务、效率、数据一致性、安全性，将 DFD 划分为手工流程和计算机程序的集合。\n"},"page":18},{"title":{"en":"CRUD Matrix and Event Modeling","zh":"CRUD 矩阵与事件建模"},"body":{"en":"**CRUD Matrix**: Tracks Create, Read, Update, Delete operations for each data entity used by each process. Ensures every master file has all four operations present somewhere in the system.\n\n| Activity | Customer | Item | Order | Order Detail |\n|:---|:---|:---|:---|:---|\n| Customer Logon | | R | | |\n| Item Inquiry | | R | | |\n| Item Selection | | R | C | |\n| Order Checkout | U | U | U | |\n| Add Account | C | | | |\n\n**Event Modeling**: An input flow from an external entity is a **trigger** that starts process activities. An **Event Response Table** maps events to their triggers, activities, responses, and destinations.\n\n| Event | Source | Trigger | Activity | Response | Destination |\n|:---|:---|:---|:---|:---|:---|\n| Customer logs on | Customer | ID + password | Verify password; send welcome | Welcome page | Customer |\n| Customer browses items | Customer | Item info | Find price/quantity; respond | Item Response page | Customer |\n| Customer places item in cart | Customer | Item + quantity | Store order detail; update total; update quantity on hand | Items Purchased page | Customer |\n| Customer checks out | Customer | Clicks \"Check Out\" | Display Customer Order page | Verification page | — |\n| Send customer email | Temporal | Hourly | Send shipment confirmation | — | Customer |\n\nEvery row in an event table represents a data flow diagram fragment used to create a single process.\n","zh":"**CRUD 矩阵**：跟踪每个过程对每个数据实体的创建、读取、更新、删除操作。确保每个主文件在系统中某处有全部四类操作。\n\n| 活动 | 客户 | 商品 | 订单 | 订单明细 |\n|:---|:---|:---|:---|:---|\n| 客户登录 | | R | | |\n| 商品查询 | | R | | |\n| 选择商品 | | R | C | |\n| 订单结算 | U | U | U | |\n\n**事件建模**：来自外部实体的输入流是启动过程活动的**触发器**。**事件响应表**将事件映射到其触发器、活动、响应和目的地。\n\n| 事件 | 来源 | 触发器 | 活动 | 响应 | 目的地 |\n|:---|:---|:---|:---|:---|:---|\n| 客户登录 | 客户 | ID+密码 | 验证密码；发送欢迎 | 欢迎页 | 客户 |\n| 客户浏览商品 | 客户 | 商品信息 | 查找价格/数量；响应 | 商品响应页 | 客户 |\n| 客户放入购物车 | 客户 | 商品+数量 | 存储订单明细；更新总计 | 已选商品页 | 客户 |\n| 客户结算 | 客户 | 点击\"结算\" | 显示客户订单页 | 验证页 | — |\n| 发送客户邮件 | 时间 | 每小时 | 发送发货确认 | — | 客户 |\n\n事件表中每一行代表一个数据流图片段，用于创建单个过程。\n"},"page":25}]},{"id":"09","title":{"en":"Process Modeling (II)","zh":"流程建模（二）"},"ref":"ref/09.Process_Modeling_2.pdf","blocks":[{"title":{"en":"Data Dictionaries","zh":"数据字典"},"body":{"en":"**Data Dictionary**: A reference work of data about data (metadata). Collects and coordinates data terms.\n\n**Data Dictionary Categories**:\n- Data flows: ID, name, description, source, destination, type, data structure, volume, comments.\n- Data structures: Composed of smaller structures and elements. Notation: `=` (composed of), `+` (and), `{}` (repetition), `[]` (either/or), `()` (optional).\n- Elements: ID, name, aliases, description, base/derived, length, data type, format, validation criteria, default value.\n- Data stores: ID, name, alias, description, file type, format, record counts, primary/secondary keys, comments.\n\n**Format Character Codes**:\n- `X`: any character\n- `9`: numbers only\n- `Z`: display leading zeros as spaces\n- `,` `,` `.` `/` `-`: formatting\n- `V`: decimal position\n\n**Using the Data Dictionary**: Create database tables, create screens/reports/forms, generate source code, analyze system design.\n","zh":"**数据字典**：关于数据的数据（元数据）的参考工具。收集和协调数据术语。\n\n**数据字典类别**：\n- 数据流：ID、名称、描述、来源、目的地、类型、数据结构、数量、备注。\n- 数据结构：由更小的结构和元素组成。表示法：`=`（组成）、`+`（和）、`{}`（重复）、`[]`（或）、`()`（可选）。\n- 元素：ID、名称、别名、描述、基本/派生、长度、数据类型、格式、验证标准、默认值。\n- 数据存储：ID、名称、别名、描述、文件类型、格式、记录数、主键/外键、备注。\n\n**格式字符代码**：\n- `X`：任何字符\n- `9`：仅数字\n- `Z`：将前导零显示为空格\n- `,` `,` `.` `/` `-`：格式化\n- `V`：小数位置\n\n**使用数据字典**：创建数据库表、创建屏幕/报告/表单、生成源代码、分析系统设计。\n"},"page":4},{"title":{"en":"Process Specifications and Structured Decisions","zh":"过程规范与结构化决策"},"body":{"en":"**Process Specifications (Minispecs)**: Created for primitive processes. Goals: reduce ambiguity, obtain precise description, validate system design. Contents: process number/name, description, input/output data flows, process type, prewritten code, logic description, unresolved issues.\n\n**Three Techniques for Structured Decision Logic**:\n\n1. **Structured English**: Used when logic involves formulas or iteration, and decisions are not complex.\n   - Structures: Sequential (action #1, #2, #3), Decision (IF-THEN-ELSE), Case (IF-CASE), Iteration (DO WHILE).\n   - Advantages: Clarifies logic, effective communication with users.\n\n2. **Decision Tables**: Used for complex combinations of conditions, actions, and rules. Four quadrants: conditions, condition alternatives, actions, rules.\n   - Helps detect incompleteness, impossible situations, contradictions, redundancy.\n   - Can simplify by combining rules.\n\n3. **Decision Trees**: Used when complex branching occurs or sequence of decisions is critical. Draw from left to right, list all alternatives.\n   - Advantages: Order of checking conditions is immediately noticeable; more readily understood.\n\n**Selection Guide**:\n- Structured English: Many repetitious actions, communication important.\n- Decision Tables: Complex combinations, need to avoid errors.\n- Decision Trees: Sequence critical, not every condition relevant to every action.\n","zh":"**过程规范（Mini规范）**：为原语过程创建。目标：减少歧义、获得精确描述、验证系统设计。内容：过程编号/名称、描述、输入/输出数据流、过程类型、预编写代码、逻辑描述、未解决问题。\n\n**结构化决策逻辑的三种技术**：\n\n1. **结构化自然语言**：当逻辑涉及公式或迭代且决策不复杂时使用。\n   - 结构：顺序（操作#1、#2、#3）、决策（IF-THEN-ELSE）、分支（IF-CASE）、迭代（DO WHILE）。\n   - 优势：阐明逻辑，与用户有效沟通。\n\n2. **决策表**：用于条件、操作和规则的复杂组合。四个象限：条件、条件备选、操作、规则。\n   - 帮助发现不完整、不可能情况、矛盾、冗余。\n   - 可以通过合并规则来简化。\n\n3. **决策树**：当出现复杂分支或决策顺序至关重要时使用。从左到右绘制，列出所有备选方案。\n   - 优势：条件检查顺序一目了然；更易理解。\n\n**选择指南**：\n- 结构化自然语言：多个重复操作、沟通重要。\n- 决策表：复杂组合、需要避免错误。\n- 决策树：顺序关键、并非每个条件都与每个操作相关。\n"},"page":18},{"title":{"en":"Checking Decision Tables","zh":"检查决策表"},"body":{"en":"Four main problems to check in decision tables:\n1. **Incompleteness**: Are there rules for all possible condition combinations? (2^N conditions → 2^N rules needed)\n2. **Impossible Situations**: Are there rules for combinations that can never occur in reality? Mark as \"impossible\" rather than leaving blank.\n3. **Contradictions**: Two or more rules have same conditions but different actions.\n4. **Redundancy**: Two or more rules have same conditions AND same actions — can be combined.\n\n**Simplifying Decision Tables**: Combine rules where condition values don't matter for the outcome. Use \"—\" (don't care) to indicate irrelevant conditions.\n","zh":"需要检查决策表中的四个主要问题：\n1. **不完整**：是否所有可能的条件组合都有对应规则？（N 个条件 → 需要 2^N 条规则）\n2. **不可能情况**：是否有对应现实中不可能出现的组合的规则？应标记为\"不可能\"而非留空。\n3. **矛盾**：两条或多条规则具有相同条件但不同操作。\n4. **冗余**：两条或多条规则具有相同条件且相同操作——可以合并。\n\n**简化决策表**：合并条件值不影响结果的规则。使用\"—\"（不关心）表示无关条件。\n"},"page":23}]},{"id":"10","title":{"en":"Object-Oriented Systems Analysis and Design","zh":"面向对象的系统分析与设计"},"ref":"ref/10.Object_Orient_Analysis.pdf","blocks":[{"title":{"en":"Object-Oriented Concepts","zh":"面向对象概念"},"body":{"en":"**Object**: Persons, places, or things relevant to the system being analyzed. An object has structure (attributes) and behavior (methods).\n\n**Class**: Defines the set of shared attributes and behaviors found in each object in the class. Instantiate = create an object from a class.\n\n**Inheritance**: When a derived class inherits all the attributes and behaviors of the base class. Reduces programming labor by using common objects easily.\n\n**Object-Oriented Analysis and Design**: Works well for complicated systems undergoing continuous change. Objects and classes are reusable. UML is the industry standard.\n","zh":"**对象**：与待分析系统相关的人、地点或事物。对象具有结构（属性）和行为（方法）。\n\n**类**：定义类中每个对象共有的属性和行为集。实例化 = 从类创建对象。\n\n**继承**：派生类继承基类的所有属性和行为。通过使用通用对象减少编程工作量。\n\n**面向对象的分析与设计**：适用于正在持续变更的复杂系统。对象和类可复用。UML 是行业标准。\n"},"page":4},{"title":{"en":"Unified Modeling Language (UML)","zh":"统一建模语言（UML）"},"body":{"en":"**UML Components**:\n- Things: Structural (classes, interfaces, use cases), Behavioral (interactions, state machines), Group (boundaries), Annotation (notes).\n- Relationships: Structural (dependencies, aggregations, associations, generalizations/specializations); Behavioral (communicates, includes, extends, generalizes).\n- Diagrams: Structural (class, object, component, deployment); Behavioral (use case, sequence, communication, statechart, activity).\n\n**UML Diagram Types**:\n\n| Diagram | Purpose |\n|:---|:---|\n| Use Case Diagram | Describes what the system does (actors, use cases, relationships) |\n| Activity Diagram | Shows sequence of activities, parallel activities, decisions; swimlanes |\n| Sequence Diagram | Illustrates interactions between classes/objects over time; emphasizes time ordering |\n| Communication Diagram | Shows same as sequence but emphasizes organization of objects |\n| Class Diagram | Static features; classes, attributes, methods, relationships (associations, whole/part, aggregation, composition) |\n| Statechart Diagram | Examines different states an object may have; complex life cycles |\n\n**Types of Classes**:\n- Entity classes: Real-world items (like ERD entities)\n- Interface/Boundary classes: User interaction (displays, windows, webpages)\n- Abstract classes: Cannot be directly instantiated; generalization/specialization\n- Control classes: Control flow of activities\n","zh":"**UML 组成部分**：\n- 事物：结构（类、接口、用例）、行为（交互、状态机）、分组（边界）、注释（笔记）。\n- 关系：结构（依赖、聚合、关联、泛化/特化）；行为（通讯、包含、扩展、泛化）。\n- 图：结构（类图、对象图、组件图、部署图）；行为（用例图、序列图、通信图、状态图、活动图）。\n\n**UML 图类型**：\n\n| 图 | 目的 |\n|:---|:---|\n| 用例图 | 描述系统做什么（参与者、用例、关系） |\n| 活动图 | 显示活动序列、并行活动、决策；泳道 |\n| 序列图 | 展示类/对象之间随时间推移的交互；强调时间顺序 |\n| 通信图 | 内容与序列图相同但强调对象组织 |\n| 类图 | 静态特征；类、属性、方法、关系（关联、整体/部分、聚合、组合） |\n| 状态图 | 检查对象可能具有的不同状态；复杂生命周期 |\n\n**类的类型**：\n- 实体类：现实世界项目（如 ERD 实体）\n- 接口/边界类：用户交互（显示屏、窗口、网页）\n- 抽象类：不能直接实例化；泛化/特化\n- 控制类：控制活动流程\n"},"page":11},{"title":{"en":"Use Case Scenario Template","zh":"用例场景模板"},"body":{"en":"A use case scenario includes three main areas:\n1. **Use case identifiers and initiators**: Name, Unique ID, Area, Actor(s), Description, Triggering Event, Trigger type.\n2. **Steps performed**: Main path step-by-step (numbered), with information for each step.\n3. **Conditions, assumptions, and questions**: Preconditions, Postconditions, Assumptions, Requirements Met, Outstanding Issues, Priority, Risk.\n\n**Example — Change Student Information**:\n\n| Element | Description |\n|:---|:---|\n| Use case name | Change Student Information |\n| Unique ID | Student UC 005 |\n| Actor(s) | Student |\n| Triggering Event | Student enters ID/password on secure website and clicks Submit |\n| Steps Performed | 1. Student logs on to secure server. 2. Record read and password verified. 3. Current info displayed. 4. Student enters changes and submits. 5. Changes validated. 6. Journal record written. 7. Student record updated. 8. Confirmation sent. |\n| Preconditions | Student is on Change Student Information web page |\n| Postconditions | Student has successfully changed personal information |\n| Assumptions | Student has browser and valid ID/password |\n| Priority | Medium |\n","zh":"用例场景包含三个主要部分：\n1. **用例标识符和发起者**：名称、唯一 ID、领域、参与者、描述、触发事件、触发类型。\n2. **执行步骤**：主路径逐步描述（编号），以及每步的信息。\n3. **条件、假设和问题**：前置条件、后置条件、假设、满足的需求、未解决问题、优先级、风险。\n\n**示例——更改学生信息**：\n\n| 要素 | 描述 |\n|:---|:---|\n| 用例名称 | 更改学生信息 |\n| 唯一 ID | Student UC 005 |\n| 参与者 | 学生 |\n| 触发事件 | 学生在安全网站输入 ID/密码并点击提交 |\n| 执行步骤 | 1. 学生登录安全服务器。2. 读取记录并验证密码。3. 显示当前信息。4. 学生输入更改并提交。5. 验证更改。6. 写入日志记录。7. 更新学生记录。8. 发送确认。 |\n| 前置条件 | 学生在更改学生信息网页上 |\n| 后置条件 | 学生已成功更改个人信息 |\n| 假设 | 学生有浏览器和有效 ID/密码 |\n| 优先级 | 中 |\n"},"page":14},{"title":{"en":"Activity Diagram Symbols and Usage","zh":"活动图符号与用法"},"body":{"en":"**Symbols**:\n- **Rectangle with rounded ends**: Activity/Action\n- **Arrow**: Control flow\n- **Diamond**: Decision/merge (branching)\n- **Long flat rectangle**: Swimlane (actor/role responsibility)\n- **Filled-in circle**: Start\n- **Black circle surrounded by white circle**: End\n- **Fork/Join bars**: Parallel activities (split and synchronize)\n\n**When to Use Activity Diagrams**:\n- Helps understand activities of a use case\n- Flow of control is complex\n- Need to model workflow\n- Need to show all scenarios for a use case\n\n**Activity Diagrams and Test Plans**: Each event and decision must be tested to verify correct state transitions.\n","zh":"**符号**：\n- **圆角矩形**：活动/动作\n- **箭头**：控制流\n- **菱形**：决策/合并（分支）\n- **长扁平矩形**：泳道（参与者/角色职责）\n- **实心圆**：开始\n- **黑圈包围的白圈**：结束\n- **分叉/汇合条**：并行活动（拆分和同步）\n\n**何时使用活动图**：\n- 帮助理解用例的活动\n- 控制流复杂\n- 需要建模工作流\n- 需要展示用例的所有场景\n\n**活动图与测试计划**：每个事件和决策都必须测试以验证正确的状态转换。\n"},"page":15},{"title":{"en":"Class Relationships and Statecharts","zh":"类关系与状态图"},"body":{"en":"**Types of Class Relationships**:\n- **Associations**: Simplest relationship; an object in one class relates to objects in another (or same) class. **Reflexive association**: relationship to objects in the same class.\n- **Association Classes**: Used to break up many-to-many associations between classes.\n- **Whole/Part Relationships**:\n  - **Aggregation**: Whole is composed of sum of its parts.\n  - **Collection**: Members may change, but whole retains its identity.\n  - **Composition**: Whole has responsibility for the parts (parts cannot exist independently).\n\n**Sequence Diagram Layers**:\n1. **Presentation Layer**: What the user sees — interface/boundary classes.\n2. **Business Layer**: Unique rules for this application — control classes.\n3. **Persistence/Data Access Layer**: Obtaining and storing data — entity classes.\n\n**Statechart Diagrams** — Create when:\n- A class has a complex life cycle.\n- An instance may update its attributes in multiple ways through the life cycle.\n- A class has an operational life cycle.\n- Two classes depend on each other.\n- The object's current behavior depends on what happened previously.\n\n**Event Types**: Signals/asynchronous messages, Synchronous calls, Temporal events (time-based).\n","zh":"**类关系类型**：\n- **关联**：最简单的关系；一个类中的对象与另一个（或同一个）类中的对象相关。**自反关联**：与同一类的对象的关系。\n- **关联类**：用于打破类之间的多对多关联。\n- **整体/部分关系**：\n  - **聚合**：整体由其各部分之和组成。\n  - **集合**：成员可能变化，但整体保持其身份。\n  - **组成**：整体对部分负责（部分不能独立存在）。\n\n**序列图层级**：\n1. **表示层**：用户所见——接口/边界类。\n2. **业务层**：应用的独特规则——控制类。\n3. **持久化/数据访问层**：获取和存储数据——实体类。\n\n**状态图**——在以下情况创建：\n- 类有复杂的生命周期。\n- 实例在整个生命周期中可能以多种方式更新其属性。\n- 类有操作生命周期。\n- 两个类相互依赖。\n- 对象的当前行为取决于之前发生的事情。\n\n**事件类型**：信号/异步消息、同步调用、时间事件（基于时间）。\n"},"page":18}]},{"id":"11","title":{"en":"Designing Output and Input","zh":"输出与输入设计"},"ref":"ref/11.Designing_Output_Input.pdf","blocks":[{"title":{"en":"MVC Pattern and Output-Input Duality","zh":"MVC 模式与输入输出二元性"},"body":{"en":"**MVC Pattern for Output and Input**:\n1. User clicks \"Reserve\" → **View** (what user sees)\n2. View → **Controller** (sends reservation request)\n3. Controller → **Model** (creates order)\n4. Model → View (updates seat status)\n\nOutput and input are two sides of one coin — every output can become input; every input shapes output. **Core Principle**: Right information, right person, right time, right medium.\n","zh":"**MVC 模式中的输出与输入**：\n1. 用户点击\"预订\" → **View**（用户所见）\n2. View → **Controller**（发送预订请求）\n3. Controller → **Model**（创建订单）\n4. Model → View（更新座位状态）\n\n输出和输入是一枚硬币的两面——每个输出都可以成为输入；每个输入都会塑造输出。**核心原则**：正确的信息、正确的人、正确的时间、正确的媒介。\n"},"page":3},{"title":{"en":"Designing Effective Output","zh":"设计有效输出"},"body":{"en":"**Output Rules**:\n1. Choose the right output method (medium)\n2. Keep it simple and uncluttered\n3. Neutralize output bias\n4. Provide context alongside summarization\n\n**Output Bias — Design Choices Shape Decisions**:\n- **Sorting Bias**: Alphabetical vs. chronological vs. ranked → different conclusions.\n- **Graphical Bias**: Bar chart vs. pie chart vs. table → different impressions.\n- **Truncation Bias**: Where you set the Y-axis changes perception dramatically.\n- **Aggregation Bias**: Summaries hide outliers; averages erase distribution.\n\nAnalysts should avoid unnecessarily biasing output and make users aware of possible biases.\n\n**Output Methods**:\n| Medium | Advantage | Best For |\n|:---|:---|:---|\n| Displays/Dashboards | Interactive, real-time, quiet | Frequently accessed, dynamic data |\n| Audio/Podcasts | Hands-free, transient | Individual alerts |\n| Mobile/Tablets | Portable, gesture-driven | On-the-go consumption |\n| Printers/Hard Copy | Highly reliable, archival | Regulatory compliance |\n\n**Neutralize Output Bias**: Design choices shape decisions. Be aware of sorting bias, graphical bias (bar vs. pie vs. table), truncation bias (Y-axis), aggregation bias (averages hide distribution).\n","zh":"**输出规则**：\n1. 选择正确的输出方法（媒介）\n2. 保持简单和整洁\n3. 消除输出偏见\n4. 提供与汇总信息一起的上下文\n\n**输出方法**：\n| 媒介 | 优势 | 最佳用途 |\n|:---|:---|:---|\n| 显示器/仪表板 | 交互式、实时、安静 | 频繁访问的动态数据 |\n| 音频/播客 | 免提、瞬时 | 个人提醒 |\n| 移动设备/平板 | 便携、手势驱动 | 移动消费 |\n| 打印机/纸质 | 高度可靠、可存档 | 法规合规 |\n\n**消除输出偏见**：设计选择塑造决策。注意排序偏见、图形偏见（条形图 vs. 饼图 vs. 表格）、截断偏见（Y 轴）、聚合偏见（平均值掩盖分布）。\n"},"page":7},{"title":{"en":"Designing Effective Input","zh":"设计有效输入"},"body":{"en":"**Input Rules**:\n1. Choose the right input method (medium)\n2. Ensure accurate completion through smart navigation, defaults, and validation\n3. Follow the natural flow (top-down, left-right)\n4. Use the proper GUI control for the data type\n\n**Input Methods**:\n| Medium | Advantage | Best For |\n|:---|:---|:---|\n| Keyboard/Typing | High speed, universal | Long-form data entry, coding |\n| Voice/Audio | Hands-free, natural | Field work, driving, accessibility |\n| Barcode/QR Scanning | Instant, accurate | Inventory, retail POS |\n| Touch/Gesture | Intuitive, no peripherals | Kiosks, mobile apps |\n\n**Smart Defaults**: Anticipate user input to reduce errors and speed completion. Pre-fill predictable fields (date, location, logged-in user info).\n\n**The Best Data Entry is No Data Entry** — Core Principle:\n- Enter what only humans can know; let the computer figure out the rest.\n- A base data item should be entered only once at only one point.\n- Bad form: 5 human-typed fields (name, phone, product, price, total).\n- Good form: 1 human-typed field (quantity only — rest auto-filled from master data/lookup).\n\n**Emerging Data-Entry Methods**: OCR (auto-fill addresses), Computer Vision (shelf recognition), LLM (extract data from unstructured emails), IoT sensors (auto-report stock levels).\n\n**Validation**: Client-side (instant feedback, catches honest mistakes) and server-side (final defense, enforces business rules, protects against malicious input).\n","zh":"**输入规则**：\n1. 选择正确的输入方法（媒介）\n2. 通过智能导航、默认值和验证确保准确完成\n3. 遵循自然流程（自上而下、从左到右）\n4. 为数据类型使用适当的 GUI 控件\n\n**输入方法**：\n| 媒介 | 优势 | 最佳用途 |\n|:---|:---|:---|\n| 键盘/打字 | 高速、通用 | 长表单数据录入、编程 |\n| 语音/音频 | 免提、自然 | 现场工作、驾驶、无障碍 |\n| 条码/二维码扫描 | 即时、准确 | 库存、零售 POS |\n| 触摸/手势 | 直观、无需外设 | 信息亭、移动应用 |\n\n**智能默认值**：预判用户输入以减少错误并加快完成速度。预填可预测字段（日期、地点、已登录用户信息）。\n\n**最好的数据录入是没有录入**——核心原则：\n- 只输入人类才能知道的信息；让计算机计算其余部分。\n- 一个基础数据项应只在一个点输入一次。\n- 坏表单：5 个人工输入字段（姓名、电话、产品、价格、总计）。\n- 好表单：1 个人工输入字段（仅数量——其余从主数据/查找中自动填充）。\n\n**新兴数据录入方法**：OCR（自动填写地址）、计算机视觉（货架识别）、LLM（从非结构化邮件中提取数据）、IoT 传感器（自动报告库存水平）。\n\n**验证**：客户端（即时反馈、捕捉诚实错误）和服务器端（最后防线、执行业务规则、防止恶意输入）。\n"},"page":15}]},{"id":"12","title":{"en":"Designing Databases and Human-Computer Interaction","zh":"数据库与人机交互设计"},"ref":"ref/12.Designing_DB_HCI.pdf","blocks":[{"title":{"en":"Databases: The Memory of the System","zh":"数据库：系统的记忆"},"body":{"en":"**Relational Databases**: Data organized into tables (relations) with rows (tuples/records) and columns (fields/attributes). Primary key uniquely identifies each row. Foreign key links tables.\n\n**Normalization (规范化)**: Process of eliminating data redundancy and anomalies.\n\n**Three Anomalies from Poor Normalization**:\n| OrderID | Customer | CustPhone | Product | UnitPrice | Qty |\n| 1001 | Zhang | 138... | iPhone | 6999 | 1 |\n| 1002 | Zhang | 138... | AirPods | 1299 | 2 |\n| 1003 | Zhang | 139... | iPhone | 7099 | 1 |\n\n- **Update Anomaly**: Phone updated in only one row → inconsistency.\n- **Insert Anomaly**: Can't add a customer without an order.\n- **Delete Anomaly**: Delete last order → customer record lost.\n\n| Normal Form | Rule | Plain Meaning |\n|:---|:---|:---|\n| 1NF | Atomic values, no repeating groups | One cell, one fact |\n| 2NF | 1NF + no partial dependency on composite key | Don't mix two things in one table |\n| 3NF | 2NF + no transitive dependency | Non-key attributes depend on key only |\n\n- Aim for 3NF by default.\n- Denormalize intentionally when query performance demands it.\n- Normalize for correctness; Denormalize for performance; Document both.\n\n**OLTP vs. OLAP**:\n| | OLTP (Operational) | OLAP (Analytical) |\n|:---|:---|:---|\n| Purpose | Run the business | Understand the business |\n| Focus | Consistency | Analyzability |\n| Schema | Normalized (2NF-3NF) | Denormalized |\n\n**NoSQL Databases**:\n- Key-Value (Redis): Sacrifices query expressiveness for speed\n- Document (MongoDB): Flexible nested data without strict schema\n- Column-Family (Cassandra): Massive write scale, no joins/transactions\n- Graph (Neo4j): Native relationship traversal\n\n**Vector Databases (向量数据库)** : Store unstructured data as high-dimensional numerical arrays (embeddings). Execute semantic similarity search. Critical for RAG (Retrieval-Augmented Generation).\n","zh":"**关系型数据库**：数据组织成表（关系），包含行（元组/记录）和列（字段/属性）。主键唯一标识每一行。外键链接表。\n\n**规范化**：消除数据冗余和异常的过程。\n\n**不规范化的三大异常**：\n| OrderID | 客户 | 电话 | 产品 | 单价 | 数量 |\n| 1001 | 张三 | 138... | iPhone | 6999 | 1 |\n| 1002 | 张三 | 138... | AirPods | 1299 | 2 |\n| 1003 | 张三 | 139... | iPhone | 7099 | 1 |\n\n- **更新异常**：仅在一行更新电话 → 不一致。\n- **插入异常**：没有订单就无法添加客户。\n- **删除异常**：删除最后一笔订单 → 客户记录丢失。\n\n| 范式 | 规则 | 通俗解释 |\n|:---|:---|:---|\n| 1NF | 原子值，无重复组 | 一个单元格，一个事实 |\n| 2NF | 1NF + 无对复合键的部分依赖 | 不要把两件事混在一张表里 |\n| 3NF | 2NF + 无传递依赖 | 非主键属性只依赖于主键 |\n\n- 默认目标是 3NF。\n- 当查询性能需要时有意识地反规范化。\n- 为正确性规范化；为性能反规范化；两者都做记录。\n\n**OLTP vs. OLAP**：\n| | OLTP（运营型） | OLAP（分析型） |\n|:---|:---|:---|\n| 目的 | 运行业务 | 理解业务 |\n| 焦点 | 一致性 | 可分析性 |\n| 模式 | 规范化（2NF-3NF） | 反规范化 |\n\n**NoSQL 数据库**：\n- 键值（Redis）：牺牲查询表达能力换取速度\n- 文档（MongoDB）：灵活的嵌套数据，无严格模式\n- 列族（Cassandra）：大规模写入扩展，无连接/事务\n- 图（Neo4j）：原生关系遍历\n\n**向量数据库**：将非结构化数据存储为高维数值数组（嵌入向量）。执行语义相似性搜索。对 RAG（检索增强生成）至关重要。\n"},"page":6},{"title":{"en":"Human-Computer Interaction (HCI)","zh":"人机交互"},"body":{"en":"**Core Principle of HCI**: Designing for fit between human, the computer, and the task.\n\n**Types of User Interfaces**:\n- Natural-language, Q&A, Menus, Form-fill, Command-language (CLI), Graphical (GUI), Web interfaces. Applications usually combine multiple types.\n\n**Seven Types of User Feedback**:\n1. Accepting input (\"I heard you\")\n2. Recognizing task (\"I understand what you want\")\n3. Producing more information (\"I need more from you\")\n4. Accepting/processing (\"Working on it...\")\n5. Rejecting input with reason (\"I can't do that because...\")\n6. Communicating delay (\"This is taking a while\")\n7. Completing task (\"Done. Here's the result.\")\n\n**The AI Era: Interaction as Conversation**:\n- Traditional: \"Teach the user to think like the database.\"\n- AI-Native: \"Teach the system to think like the user.\"\n- Agentic: \"Delegate to the system to act on your behalf.\"\n\nAgentic interfaces: User expresses a GOAL; the system PLANS and EXECUTES multiple steps autonomously. Requires tools (APIs, code execution), memory across turns, human-in-the-loop checkpoints.\n\n**Agentic vs. Natural Language**:\n| | Natural Language Query | Agentic Interface |\n|:---|:---|:---|\n| System does | Returns ONE answer | Runs a multi-step PLAN |\n| User does | Decides next action | Supervises, not operates |\n| Example | \"Show sales in Q3\" | \"Fix this bug end-to-end\" — plans → edits → tests → reports |\n\nFor the first time, the user does not OPERATE the system — the user DELEGATES to the system.\n\n**Historical Perspective**:\n- **1970s-2000s**: Users learned the database's language (SQL, menus, forms).\n- **2010s**: Mobile/touch made interaction more natural; data stayed structured.\n- **2020s**: Vector + LLM let the system understand the USER's language.\n","zh":"**人机交互的核心原则**：设计人与计算机和任务之间的适配。\n\n**用户界面类型**：\n- 自然语言、问答、菜单、表单填充、命令语言（CLI）、图形界面（GUI）、Web 界面。应用程序通常组合多种类型。\n\n**七种用户反馈类型**：\n1. 接受输入（\"我听到了\"）\n2. 识别任务（\"我明白你想要什么\"）\n3. 请求更多信息（\"我需要你提供更多信息\"）\n4. 接受/处理中（\"正在处理...\"）\n5. 拒绝输入并说明原因（\"我无法做到，因为...\"）\n6. 告知延迟（\"这需要一点时间\"）\n7. 完成任务（\"完成。这是结果。\"）\n\n**AI 时代：作为对话的交互**：\n- 传统：\"教用户像数据库一样思考。\"\n- AI 原生：\"教系统像用户一样思考。\"\n- 智能体：\"将任务委托给系统，让它代表你行动。\"\n\n智能体界面：用户表达目标；系统自主规划和执行多步骤行动。需要工具（API、代码执行）、跨轮次记忆、人在回路检查点。\n\n**智能体 vs. 自然语言**：\n| | 自然语言查询 | 智能体界面 |\n|:---|:---|:---|\n| 系统做 | 返回一个答案 | 运行多步骤计划 |\n| 用户做 | 决定下一步行动 | 监督而非操作 |\n| 示例 | \"显示 Q3 销售额\" | \"从头到尾修复这个 bug\"——计划→编辑→测试→报告 |\n\n历史上第一次，用户不再操作系统——用户将任务委托给系统。\n\n**历史视角**：\n- **1970s-2000s**：用户学习数据库的语言（SQL、菜单、表单）。\n- **2010s**：移动/触控使交互更自然；数据保持结构化。\n- **2020s**：向量+LLM 让系统理解用户的语言。\n"},"page":20}]},{"id":"13","title":{"en":"Quality Assurance","zh":"质量保证"},"ref":"ref/13.Quality_Assurance.pdf","blocks":[{"title":{"en":"Designing Accurate Data Entry Procedures","zh":"设计准确的数据录入流程"},"body":{"en":"**Effective Coding (数据编码)** :\n- **Simple Sequence Code**: Assigned number with no relation to data itself. Best for identifiers (e.g., customer_id). Stable, privacy-safe, deletable without breaking references.\n- **Block Sequence Code**: Groups data by common characteristics. Useful for events that may be classified (e.g., order_id: [type]-[date]-[sequence]).\n- **Significant-Digit Subset Code**: Each digit position has meaning. Useful for products (e.g., SKU). Enables bulk operations (e.g., \"all speakers 20% off\").\n- Other codes: Classification, Cipher, Mnemonic, Function.\n\n**Coding Guidelines**: Concise, stable, unique, sortable, avoid confusion, uniform, modifiable, meaningful.\n\n**Trade-offs of the Three Coding Strategies**:\n\n| Coding Type | Best For | Benefit | Cost |\n|:---|:---|:---|:---|\n| Simple Sequence Code (customer_id) | Identifiers | Permanently stable, privacy-safe, can delete personal info without breaking references | Unreadable, exposes scale |\n| Block Sequence Code (order_id) | Events/Classification | Natural time ordering, date-range queries = primary key range scans | Counter needs centralized management, exposes daily transaction volume |\n| Significant-Digit Subset Code (SKU) | Products | Human-readable, sortable by segment, bulk operations in one SQL | Segment meanings may become outdated, each segment has space limits |\n\n**Effective Data Capture – The Core Principle**:\n- Enter what only humans can know; let the computer figure out the rest.\n- A base data item should be entered only once at only one point.\n\n**Data Capture Decision Matrix**:\n\n| Question | Yes → | No → |\n|:---|:---|:---|\n| Does it vary? | Capture each time (quantity, date) | Look up from master data |\n| Does it distinguish this record? | Capture (SKU to order) | Derive (SKU name, price, weight) |\n| Can the computer figure it out? | Generate (timestamp, ID, total) | Capture |\n\n**Validation (Check Digit)**: Eight types of validation:\n1. Missing Data\n2. Field Length\n3. Class/Composition (character type)\n4. Range/Reasonableness\n5. Invalid values (blacklist)\n6. Comparison with Stored Data (foreign key existence)\n7. Self-Checking Digits (Luhn algorithm)\n8. Pattern Match (regex)\n\n**Two Layers of Defense**:\n- Client-Side Validation: Instant feedback, catches honest mistakes.\n- Server-Side Validation: Final defense, enforces business rules, protects against malicious input.\n\n**Validation Pipeline — Error Cost Grows Exponentially by Stage**:\n```\nClient Validation → Server Validation → Database Constraints → Manual Repair\nCapture cost:    $1               $10                 $100              $1000+\n```\nThree lines of defense: Never trust client data — re-validate everything on the server side. Server-side validation is the only defense that truly matters.\n","zh":"**有效编码**：\n- **简单序列码**：分配的编号与数据本身无关。最适合标识符（如 customer_id）。稳定、隐私安全、删除时不会破坏引用。\n- **分类序列编码**：按共同特征分组数据。适用于可能需要分类的事件（如 order_id：[类型]-[日期]-[序列]）。\n- **子集代号编码**：每个数字位置都有含义。适用于产品（如 SKU）。支持批量操作（如\"所有扬声器八折\"）。\n- 其他代码：分类码、密码、助记码、功能码。\n\n**编码指南**：简洁、稳定、唯一、可排序、避免混淆、统一、可修改、有意义。\n\n**三种编码策略的权衡**：\n\n| 编码类型 | 适用场景 | 收益 | 代价 |\n|:---|:---|:---|:---|\n| 简单序列码 (customer_id) | 标识符 | 永久稳定、隐私安全、可删除个人信息而不破坏引用 | 不可读、暴露规模 |\n| 分类序列编码 (order_id) | 事件/分类 | 自然时间排序、日期范围查询=主键范围扫描 | 计数器需集中管理、暴露每日交易量 |\n| 子集代号编码 (SKU) | 产品 | 人工可读、可按段排序、批量操作一行 SQL | 段含义可能过时、每段有空间限制 |\n\n**有效数据捕获——核心原则**：\n- 只输入人类才能知道的信息；让计算机计算出其余部分。\n- 一个基础数据项应只在一个点输入一次。\n\n**数据捕获决策矩阵**：\n\n| 问题 | Yes → | No → |\n|:---|:---|:---|\n| 是否可变？ | 每次捕获（数量、日期） | 从主数据查找 |\n| 是否区分此记录？ | 捕获（要订购的 SKU） | 派生（SKU 的名称、价格、重量） |\n| 计算机能否计算？ | 生成（时间戳、ID、总计） | 捕获 |\n\n**验证**：八种验证类型：\n1. 缺失数据\n2. 字段长度\n3. 类别/组成（字符类型）\n4. 范围/合理性\n5. 无效值（黑名单）\n6. 与存储数据比较（外键存在性）\n7. 自校验位（Luhn 算法）\n8. 模式匹配（正则表达式）\n\n**两道防线**：\n- 客户端验证：即时反馈，捕捉诚实错误。\n- 服务器端验证：最后防线，执行业务规则，防止恶意输入。\n\n**验证管道——错误成本随阶段指数增长**：\n```\n客户端验证 → 服务器端验证 → 数据库约束 → 人工修复\n捕获成本: $1          $10            $100        $1000+\n```\n三道防线：永远不要信任客户端数据——在服务端重新验证一切。服务端验证是唯一真正重要的防线。\n"},"page":4},{"title":{"en":"Quality Assurance and Implementation","zh":"质量保证与实施"},"body":{"en":"**Total Quality Management (TQM)** : Full organizational support of quality management; early commitment to quality.\n\n**Test-First Principle**:\n- Test plan: All preparations for tests.\n- Unit testing: Tests each program separately.\n- System testing: Tests functioning of system as a whole.\n- Acceptance testing: Ensures system is ready for production.\n\n**Structured Walkthroughs**: Use peer reviewers to monitor development; point out problems; allow changes.\n\n**Taming Complexity: Modularity**:\n- **Divide and Conquer**: The oldest engineering principle. Modules let each person understand one piece at a time; teams work on different modules simultaneously; change is local.\n- **Top-Down Approach**: Whole → subsystems → modules → each module does ONE thing.\n- **Designing for Maintenance**: Keep modules manageable size; pay attention to critical interfaces; minimize modules user must modify when changing.\n\n**Documentation — \"If It Isn't Written Down, It Doesn't Exist\"**:\n- **Procedure Manuals**: The classic approach.\n- **Docs-as-Code (2026)**: Documentation lives in Git alongside code; versioned, reviewed, deployed with code. Tools: MkDocs, Docusaurus, Confluence+Git.\n- **AI-Assisted Documentation**: LLMs auto-generate docs from code; AI summarizes meeting notes into specs; chatbots serve as \"living documentation.\"\n\n**Conversion Strategies**:\n- Parallel: Old and new run together.\n- Direct cutover: Old stops, new starts.\n- Pilot: New in one location first.\n- Phased: New in stages.\n\n**Training — Not Just Knowledge Transfer, It's Change Management**:\n\n| Element | Considerations |\n|:---|:---|\n| Training Objectives | Depend on user's job requirements |\n| Training Methods | Combination of lecture, demonstration, hands-on, study |\n| Training Sites | On-site, vendor facilities, in-house, rented |\n| Training Materials | Operating manuals, cases, prototypes, online tutorials |\n\n**Security, Recovery, and Evaluation**:\n- Security: Authentication, authorization, availability, confidentiality.\n- Disaster Recovery: Backup and redundancy — assume everything will fail eventually.\n- Evaluation: Define \"success\" before building, or you'll never prove it after.\n","zh":"**全面质量管理（TQM）**：组织全力支持质量管理；早期承诺质量。\n\n**测试先行原则**：\n- 测试计划：测试的所有准备。\n- 单元测试：分别测试每个程序。\n- 系统测试：测试整个系统的功能。\n- 验收测试：确保系统可用于生产环境。\n\n**结构化复核**：使用同行评审者监控开发；指出问题；允许修改。\n\n**控制复杂性：模块化**：\n- 分而治之原则。\n- 每个模块只做一件事。\n- 自顶向下方法：整体 → 子系统 → 模块。\n\n**文档化**：\"如果没有写下来，它就不存在。\" Docs-as-Code（Git、版本化、AI 辅助）。\n\n**切换策略**：\n- 并行：新旧系统一起运行。\n- 直接切换：旧系统停止，新系统启动。\n- 试点：首先在一个地点引入新系统。\n- 分阶段：分阶段引入新系统。\n\n**模块化与文档化**：\n- **分而治之**：最古老的工程原则。模块让每个人一次理解一块；团队同时在不同模块上工作；变更局部化。\n- **自顶向下方法**：整体→子系统→模块→每个模块只做一件事。\n- **面向维护的设计**：保持模块大小可管理；关注关键接口；最小化变更时用户需要修改的模块数量。\n\n**文档化——\"如果没有写下来，它就不存在\"**：\n- **操作手册**：经典方法。\n- **Docs-as-Code（2026）**：文档与代码同存于 Git；版本化、审查、与代码一起部署。工具：MkDocs、Docusaurus、Confluence+Git。\n- **AI 辅助文档化**：LLM 从代码自动生成文档；AI 将会议记录总结为规格说明；聊天机器人充当\"活文档\"。\n\n**培训——不仅是知识传递，更是变革管理**：\n\n| 要素 | 考量 |\n|:---|:---|\n| 培训目标 | 取决于用户的工作需求 |\n| 培训方法 | 组合讲课、演示、动手操作、自学 |\n| 培训地点 | 现场、供应商设施、自建、租赁 |\n| 培训材料 | 操作手册、案例、原型、在线教程 |\n\n**安全、恢复与评估**：\n- 安全性：身份认证、授权、可用性、保密性。\n- 灾难恢复：备份与冗余——假设一切最终都会失效。\n- 评估：在构建之前定义\"成功\"，否则之后将无法证明。\n"},"page":26}]},{"id":"14","title":{"en":"Conclusion","zh":"结论"},"ref":"ref/14.Conclusion (1).pdf","blocks":[{"title":{"en":"The MIS Analyst's Mindset","zh":"MIS 分析师的思维模式"},"body":{"en":"- Information systems are socio-technical systems.\n- Technology alone does not solve organizational problems.\n- Good analysis begins with understanding current work.\n- Requirements emerge through investigation and negotiation.\n- Models help clarify complexity.\n- Design choices shape behavior, memory, and decision-making.\n- Implementation is organizational change.\n","zh":"- 信息系统是社会技术系统。\n- 仅靠技术不能解决组织问题。\n- 好的分析始于理解当前工作。\n- 需求通过调查和协商浮现。\n- 模型帮助澄清复杂性。\n- 设计选择塑造行为、记忆和决策。\n- 实施就是组织变革。\n"},"page":6},{"title":{"en":"Trends and Open Issues","zh":"趋势与开放问题"},"body":{"en":"**1. Digital Transformation and Ecosystems**:\n- Organizations increasingly operate through digital platforms, APIs, cloud services, mobile apps.\n- Boundaries become fluid; coordination extends beyond firm; platform governance becomes central.\n- Future of MIS is ecosystem coordination.\n\n**2. Algorithmic Decision-Making**:\n- MIS moving from recording transactions to analyzing patterns, predicting outcomes, recommending actions, automating decisions.\n- Open issues: data quality, bias, explainability, accountability, overreliance, human oversight, responsible governance.\n\n**3. Human-AI Relationship**:\n- Automation: AI performs tasks instead of humans.\n- Augmentation: AI helps humans perform tasks better.\n- Guardianship: Humans raise/cultivate AI agents and take accountability.\n- Central design challenge: responsibility design, not just interface design.\n\n**Final Message**:\nTo analyze and design information systems is to participate in the design of organizational intelligence. Be critical users, thoughtful analysts, and responsible designers of digital futures.\n","zh":"**1. 数字化转型与生态系统**：\n- 组织越来越多地通过数字平台、API、云服务、移动应用运作。\n- 边界变得流动；协调超出公司范围；平台治理变得核心。\n- MIS 的未来是生态系统协调。\n\n**2. 算法决策**：\n- MIS 正从记录交易转向分析模式、预测结果、推荐行动、自动化决策。\n- 开放问题：数据质量、偏见、可解释性、问责制、过度依赖、人类监督、负责任的治理。\n\n**3. 人-AI 关系**：\n- 自动化：AI 代替人类执行任务。\n- 增强：AI 帮助人类更好地执行任务。\n- 监护：人类培养 AI 智能体并承担责任。\n- 核心设计挑战：责任设计，而不仅仅是界面设计。\n\n**最终寄语**：\n分析和设计信息系统就是参与组织智能的设计。成为批判性的用户、深思熟虑的分析师和负责任的数字未来设计者。\n"},"page":7}]}]}};</script>
<script>
// ===== DATA =====
let SYNONYMS = {};
let DATA = null;
let showEN = true;
let showZH = true;
let searchQuery = '';

function renderBlockBody(b) {
  if (showEN && showZH) {
    return `<div class="bilingual-cols"><div class="col-en"><div class="col-label">EN</div>${md2html(b.body.en)}</div><div class="col-zh"><div class="col-label">ZH</div>${md2html(b.body.zh)}</div></div>`;
  }
  const lang = showEN ? 'en' : 'zh';
  return md2html(b.body[lang]);
}

function blockTitleText(b, s) {
  if (!b.title.en && !b.title.zh) return s.title[showEN ? 'en' : 'zh'] || '';
  if (showEN && showZH) return (b.title.en || '') + ' | ' + (b.title.zh || '');
  return b.title[showEN ? 'en' : 'zh'] || b.title[showEN ? 'zh' : 'en'] || '';
}

// ===== LOAD =====
async function loadJSON(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function init() {
  const main = document.getElementById('main');
  const sd = document.getElementById('statusDot');
  const st = document.getElementById('statusText');

  // Offline: use embedded globals if available
  if (window.__EMBEDDED__) {
    SYNONYMS = window.__EMBEDDED__.synonyms;
    DATA = window.__EMBEDDED__.data;
  }
  const tasks = window.__EMBEDDED__ ? [] : [
    { name: 'synonyms.json', fn: () => loadJSON('synonyms.json').then(d => { SYNONYMS = d; }) },
    { name: 'data.json', fn: () => loadJSON('content/data.json').then(d => { DATA = d; }) }
  ];

  let ok = 0, failed = [];
  for (const t of tasks) {
    try { await t.fn(); ok++; st.textContent = `${ok}/${tasks.length}`; }
    catch(e) { failed.push(t.name); st.textContent = `✗ ${t.name}`; }
  }

  if (failed.length > 0) { sd.className = 'status-dot err'; st.textContent = '加载失败'; }

  if (!DATA || !DATA.sessions) {
    main.innerHTML = `<div class="err-box fade-in">
      <div class="icon-svg" style="justify-content:center;margin-bottom:12px"><svg width="36" height="36" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
      <p><strong>无法加载数据</strong></p>
      <p style="margin-top:8px">请先运行 <span class="cmd">node convert.js</span></p>
      <p style="margin-top:4px"><span class="cmd">npx serve .</span></p>
    </div>`;
    return;
  }

  sd.className = 'status-dot ok';
  st.textContent = '就绪';
  render();
  document.getElementById('searchInput').focus();
}

// ===== RENDER =====
function render() {
  const main = document.getElementById('main');
  if (!DATA || !DATA.sessions) {
    main.innerHTML = '<div class="err-box">数据为空</div>';
    return;
  }

  const sessions = DATA.sessions;
  const q = searchQuery.trim().toLowerCase();

  // Synonym expansion
  let tokens = q ? [q] : [];
  if (q && Object.keys(SYNONYMS).length) {
    for (const [key, syns] of Object.entries(SYNONYMS)) {
      const all = [key.toLowerCase(), ...syns.map(s => s.toLowerCase())];
      for (const t of all) {
        if (q === t || q.includes(t) || t.includes(q)) {
          tokens.push(key.toLowerCase(), ...syns.map(s => s.toLowerCase()));
          break;
        }
      }
    }
    tokens = [...new Set(tokens)];
  }

  // Synonym hint
  const hint = document.getElementById('synonymHint');
  if (q && tokens.length > 1) {
    hint.innerHTML = '<svg style="width:12px;height:12px;stroke:var(--text-secondary);fill:none;stroke-width:2;stroke-linecap:round;vertical-align:middle" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> ' + tokens.filter(t => t !== q).slice(0, 5).join(', ');
    hint.style.display = 'block';
  } else { hint.style.display = 'none'; }

  let totalHits = 0, html = '';

  for (const s of sessions) {
    let sHit = false;
    let blocksHtml = '';

    for (const b of s.blocks) {
      let hit = false;
      const bTitle = blockTitleText(b, s);
      let bodyHtml = renderBlockBody(b);

      if (q) {
        const txt = (b.title.en||'') + ' ' + (b.title.zh||'') + ' ' + (b.body.en||'') + ' ' + (b.body.zh||'');
        for (const tk of tokens) {
          if (!tk) continue;
          if (buildTokenRE(tk).test(txt.toLowerCase())) { hit = true; break; }
        }
        if (hit) { sHit = true; totalHits++; }
        bodyHtml = renderBlockBody(b); // re-render with highlights
        for (const tk of tokens) {
          if (!tk) continue;
          bodyHtml = bodyHtml.replace(buildTokenRE(tk), '<mark class="hl">$1</mark>');
        }
      }

      const refFile = s.ref ? s.ref.replace(/^ref\//, '') : '';
      const blockRefHref = s.ref + (b.page ? '#page=' + b.page : '');
      const blockRefHtml = s.ref
        ? `<a class="block-ref" href="${esc(blockRefHref)}" target="_blank" title="${esc(refFile)}${b.page ? ' p.'+b.page : ''}" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg><span class="ref-fname">${esc(refFile)}</span>${b.page ? '<span class="ref-page">'+b.page+'</span>' : ''}</a>`
        : '';
      const cls = hit ? 'block open match' : 'block';
      blocksHtml += `<div class="${cls}">
        <div class="block-head" onclick="this.parentElement.classList.toggle('open')">
          <span class="block-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span>
          <span class="block-title">${esc(bTitle)}</span>
          ${blockRefHtml}
          ${hit ? '<span class="block-badge"><svg style="width:10px;height:10px;stroke:#ffd700;fill:none;stroke-width:2.5;stroke-linecap:round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>' : ''}
        </div>
        <div class="block-body">${bodyHtml}</div>
      </div>`;
    }

    const refHtml = s.ref
      ? `<a class="session-ref" href="${esc(s.ref)}" target="_blank" title="打开原始课件 PDF" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg> PDF</a>`
      : '';

    const sTitle = showEN && showZH ? (s.title.en || s.title.zh) : (s.title[showEN ? 'en' : 'zh'] || s.title[showEN ? 'zh' : 'en'] || '');
    const sCls = 'session' + (sHit ? ' open highlight' : '');
    html += `<div class="${sCls}">
      <div class="session-head" onclick="this.parentElement.classList.toggle('open')">
        <span class="session-num">${esc(s.id)}</span>
        <span class="session-title">${esc(sTitle)}</span>
        ${refHtml}
        <span class="session-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
      <div class="session-body">${blocksHtml}</div>
    </div>`;
  }

  // Footer
  if (!q) {
    html += `<div class="empty fade-in"><div class="icon-svg" style="justify-content:center;margin-bottom:12px"><svg width="36" height="36" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg></div><p>共 ${sessions.length} 章</p><p style="font-size:0.8rem;color:var(--text-secondary)">输入关键词搜索 · 中英文同义词 · 点击展开</p></div>`;
  } else if (totalHits === 0) {
    html += `<div class="empty fade-in"><div class="icon-svg" style="justify-content:center;margin-bottom:12px"><svg width="36" height="36" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><p>未找到 "<strong>${esc(searchQuery)}</strong>"</p><p style="font-size:0.8rem;color:var(--text-secondary)">试试中英文对应词</p></div>`;
  }

  main.innerHTML = html;
  if (!q) document.querySelectorAll('.session').forEach(el => el.classList.add('open'));
}

// ===== Markdown → HTML =====
function md2html(md) {
  if (!md) return '';
  // Normalize Windows line endings
  let h = esc(md).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h = h.replace(/(?<!\*)\*([^*\n]+?)\*(?!\*)/g,'<em>$1</em>');

  const lines = h.split('\n');
  const out = [];

  function flushGroup(g) {
    if (!g.length) return;
    const isOL = /^\d+\.\s/.test(g[0]);
    const tag = isOL ? 'ol' : 'ul';
    out.push('<' + tag + '>');
    for (const item of g) {
      const content = item.replace(/^(\d+\.\s|[-*]\s)/, '');
      out.push('<li>' + content + '</li>');
    }
    out.push('</' + tag + '>');
  }

  function flushPara(p) {
    if (!p.length) return;
    out.push('<p>' + p.join('<br>') + '</p>');
    p.length = 0;
  }

  let group = [], tbl = [], para = [];
  for (const l of lines) {
    // Table row
    if (/^\|.+\|/.test(l)) {
      flushGroup(group); group = [];
      flushPara(para);
      tbl.push(l);
      continue;
    }
    if (tbl.length) { out.push(renderTable(tbl)); tbl = []; }

    // List item
    if (/^(\d+\.\s|[-*]\s)/.test(l)) {
      flushPara(para);
      const isOL = /^\d+\.\s/.test(l);
      const prevOL = group.length && /^\d+\.\s/.test(group[0]);
      if (group.length && isOL !== prevOL) { flushGroup(group); group = []; }
      group.push(l);
      continue;
    }

    flushGroup(group); group = [];

    // Blank line → paragraph break
    if (!l.trim()) {
      flushPara(para);
      continue;
    }

    // Regular text line
    para.push(l);
  }
  flushGroup(group);
  flushPara(para);
  if (tbl.length) out.push(renderTable(tbl));
  return out.join('');
}

function renderTable(lns) {
  if (lns.length < 2) return lns.join('<br>');
  const pr = l => l.replace(/^\|/,'').replace(/\|$/,'').split('|').map(c => c.trim());
  const hd = pr(lns[0]), sp = pr(lns[1]);
  if (!sp.every(c => /^:?-{3,}:?$/.test(c))) return lns.join('<br>');
  let t = '<table><thead><tr>';
  for (const c of hd) t += `<th>${c}</th>`;
  t += '</tr></thead><tbody>';
  for (let i = 2; i < lns.length; i++) {
    t += '<tr>';
    for (const c of pr(lns[i])) t += `<td>${c}</td>`;
    t += '</tr>';
  }
  return t + '</tbody></table>';
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Build regex for a search token: ASCII tokens get \b word boundaries, CJK tokens match directly
function buildTokenRE(token) {
  const raw = token.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  if (/[一-鿿぀-ゟ가-힯]/.test(token)) {
    return new RegExp('(' + raw + ')', 'gi');
  }
  return new RegExp('\\b(' + raw + ')\\b', 'gi');
}

// ===== SUGGESTIONS =====
function lookupSuggestions(input) {
  const q = input.trim().toLowerCase();
  if (!q || !Object.keys(SYNONYMS).length) return [];
  const results = [];
  const seen = new Set();
  for (const [key, syns] of Object.entries(SYNONYMS)) {
    // Check key AND all synonym values
    const all = [key.toLowerCase(), ...syns.map(s => s.toLowerCase())];
    let matched = false;
    for (const t of all) {
      if (t === q || t.includes(q) || q.includes(t)) {
        matched = true;
        break;
      }
    }
    if (matched && !seen.has(key)) {
      seen.add(key);
      results.push({ key, syns });
    }
  }
  // Sort: exact match first, then shorter key first
  results.sort((a, b) => {
    const aExact = a.key.toLowerCase() === q ? 0 : 1;
    const bExact = b.key.toLowerCase() === q ? 0 : 1;
    if (aExact !== bExact) return aExact - bExact;
    return a.key.length - b.key.length;
  });
  return results.slice(0, 8);
}

function showSuggestions(input) {
  const drop = document.getElementById('suggestDrop');
  const matches = lookupSuggestions(input);
  if (!matches.length) { drop.classList.remove('open'); return; }

  let html = '<div class="suggest-label">同义词建议 — 点击替换搜索词</div><div class="suggest-chips">';
  for (const m of matches) {
    // Show all unique synonyms as chips
    const seen = new Set();
    for (const s of m.syns) {
      if (seen.has(s)) continue;
      seen.add(s);
      const isCN = /[一-鿿]/.test(s);
      html += `<span class="chip" data-word="${esc(s)}" onclick="selectChip(this)" title="点击搜索「${esc(s)}」">${esc(s)}<span class="chip-lang">${isCN ? '中' : 'EN'}</span></span>`;
    }
  }
  html += '</div>';
  drop.innerHTML = html;
  drop.classList.add('open');
}

function selectChip(chip) {
  const word = chip.dataset.word;
  const input = document.getElementById('searchInput');
  const drop = document.getElementById('suggestDrop');
  input.value = word;
  drop.classList.remove('open');
  searchQuery = word;
  document.getElementById('clearBtn').classList.add('visible');
  render();
  // Don't refocus — stay in content to read results
}

function hideSuggestions() {
  document.getElementById('suggestDrop').classList.remove('open');
}

// ===== SEARCH =====
let dt;
document.getElementById('searchInput').addEventListener('input', function() {
  const val = this.value;
  clearTimeout(dt);
  dt = setTimeout(() => {
    searchQuery = val.trim();
    document.getElementById('clearBtn').classList.toggle('visible', searchQuery.length > 0);
    showSuggestions(val);
    render();
  }, 150);
});

document.getElementById('searchInput').addEventListener('focus', function() {
  if (this.value.trim()) showSuggestions(this.value);
});

// Click outside to close suggestions
document.addEventListener('click', function(e) {
  const wrap = document.querySelector('.suggest-wrap');
  if (wrap && !wrap.contains(e.target)) hideSuggestions();
});

document.getElementById('clearBtn').addEventListener('click', function() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  this.classList.remove('visible');
  hideSuggestions();
  render();
  document.getElementById('searchInput').focus();
});

// ===== LANGUAGE =====
document.getElementById('btnEN').addEventListener('click', function() {
  this.classList.toggle('active');
  showEN = this.classList.contains('active');
  if (!showEN && !showZH) { showZH = true; document.getElementById('btnZH').classList.add('active'); }
  render();
});
document.getElementById('btnZH').addEventListener('click', function() {
  this.classList.toggle('active');
  showZH = this.classList.contains('active');
  if (!showEN && !showZH) { showEN = true; document.getElementById('btnEN').classList.add('active'); }
  render();
});

// ===== KEYBOARD =====
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey||e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
  if (e.key === 'Escape') { hideSuggestions(); document.getElementById('searchInput').blur(); }
});

init();
</script>
