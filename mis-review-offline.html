<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MIS 期末速查</title>
<style>
:root{
--font-sans:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter','Segoe UI','Roboto','PingFang SC','Microsoft YaHei',sans-serif;
--font-mono:'Consolas','SF Mono','Menlo','Monaco','Courier New',monospace;
color-scheme:dark;font-family:var(--font-sans);text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;
--accent:#2ea35f;--accent-dark:#24804a;
--bg-primary:#111;--bg-secondary:#1e1e1e;--surface:#222;--surface-alt:#2a2a2a;
--surface-blur:rgba(34,34,34,0.9);--surface-blur-alt:rgba(72,72,72,0.5);
--surface-hover:rgba(255,255,255,0.08);--surface-active:rgba(255,255,255,0.14);
--text-primary:#e0e0e0;--text-secondary:#a9a9a9;
--border:rgba(169,169,169,0.2);--border-blur:rgba(113,113,113,0.2);
--code-bg:rgba(255,0,0,0.12);--code-text:#ff8585;
--radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-pill:9999px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-primary);color:var(--text-primary);font-size:1rem;line-height:1.5;}
::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-track{background:var(--surface-blur)}
::-webkit-scrollbar-thumb{background:rgba(165,165,165,0.4);border-radius:var(--radius-pill)}

.header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--surface-blur);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border-blur);padding:12px 16px}
.header-inner{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.search-box{display:flex;align-items:center;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-pill);padding:8px 16px;gap:8px;transition:border-color 0.2s}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,163,95,0.15)}
.search-box input{flex:1;border:none;background:transparent;color:var(--text-primary);font-size:0.95rem;outline:none;min-width:0}
.search-box input::placeholder{color:var(--text-secondary)}
.search-icon{color:var(--text-secondary);flex-shrink:0;display:flex;align-items:center}
.search-icon svg{width:16px;height:16px;stroke:var(--text-secondary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.search-clear{display:none;background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:2px 6px;border-radius:var(--radius-sm);flex-shrink:0;align-items:center}
.search-clear:hover{color:var(--text-primary)}
.search-clear:hover svg{stroke:var(--text-primary)}
.search-clear.visible{display:flex}
.search-clear svg{width:14px;height:14px;stroke:var(--text-secondary);fill:none;stroke-width:2;stroke-linecap:round}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn.active svg{stroke:#fff}
.icon-svg{display:inline-flex;align-items:center}
.icon-svg svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;border-radius:var(--radius-pill);border:1px solid var(--border);padding:6px 14px;font:inherit;font-size:0.85rem;font-weight:500;background:var(--surface-alt);color:var(--text-primary);cursor:pointer;transition:all 0.15s ease;white-space:nowrap;user-select:none}
.btn:hover{border-color:var(--accent);background:var(--surface-hover)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.status-bar{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text-secondary);margin-left:auto;flex-shrink:0}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-dot.ok{background:var(--accent)}
.status-dot.err{background:#ff4d50}
.synonym-hint{font-size:0.75rem;color:var(--text-secondary);padding:2px 10px;border-radius:var(--radius-pill);background:var(--surface-hover);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Suggestion dropdown */
.suggest-wrap{position:relative;flex:1;display:flex}
.suggest-wrap .search-box{flex:1}
.suggest-drop{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 12px;z-index:200;box-shadow:var(--shadow-3);max-height:200px;overflow-y:auto;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.suggest-drop.open{display:block}
.suggest-drop::-webkit-scrollbar{width:4px}
.suggest-label{font-size:0.68rem;color:var(--text-secondary);padding:0 2px 6px;text-transform:uppercase;letter-spacing:0.5px}
.suggest-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{display:inline-flex;align-items:center;gap:2px;padding:4px 10px;border-radius:var(--radius-pill);font-size:0.8rem;border:1px solid var(--border);background:var(--surface-alt);color:var(--text-primary);cursor:pointer;transition:all 0.12s;white-space:nowrap;user-select:none}
.chip:hover{border-color:var(--accent);background:rgba(46,163,95,0.12)}
.chip:active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip .chip-lang{font-size:0.6rem;color:var(--text-secondary);opacity:0.7}
.chip:hover .chip-lang{color:var(--accent)}

.main{padding-top:120px;max-width:960px;margin:0 auto;padding-left:16px;padding-right:16px;padding-bottom:80px}
@media(max-width:600px){.main{padding-top:150px}}

.session{margin-bottom:8px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);background:var(--surface);transition:border-color 0.2s}
.session.highlight{border-color:var(--accent);box-shadow:0 0 20px rgba(46,163,95,0.12)}
.session-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;background:var(--surface-blur-alt)}
.session-head:hover{background:var(--surface-hover)}
.session-num{font-size:0.8rem;font-weight:700;color:var(--accent);background:rgba(46,163,95,0.15);padding:3px 10px;border-radius:var(--radius-pill);flex-shrink:0}
.session-title{flex:1;font-size:0.95rem;font-weight:600;min-width:0}
.session-ref{display:inline-flex;align-items:center;gap:3px;font-size:0.75rem;color:var(--text-secondary);text-decoration:none;padding:3px 8px;border-radius:var(--radius-pill);border:1px solid var(--border);flex-shrink:0;transition:all 0.15s}
.session-ref:hover{color:var(--accent);border-color:var(--accent);background:rgba(46,163,95,0.1)}
.session-ref svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.block-ref{display:inline-flex;align-items:center;gap:3px;min-width:22px;height:22px;padding:0 6px;border-radius:var(--radius-sm);color:var(--text-secondary);text-decoration:none;flex-shrink:0;transition:all 0.15s;opacity:0;margin-right:0;font-size:0.7rem;white-space:nowrap}
.block-head:hover .block-ref,.block.open .block-ref{opacity:1}
.block-ref:hover{color:var(--accent);background:rgba(46,163,95,0.12)}
.block-ref svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ref-page{font-size:0.65rem;font-weight:600;color:var(--accent);line-height:1;margin-left:1px}
.ref-fname{max-width:120px;overflow:hidden;text-overflow:ellipsis}
.session-arrow{display:flex;align-items:center;flex-shrink:0;transition:transform 0.2s}
.session-arrow svg{width:12px;height:12px;stroke:var(--text-secondary);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.session.open .session-arrow{transform:rotate(90deg)}
.session-body{display:none;padding:8px 16px 16px;border-top:1px solid var(--border)}
.session.open .session-body{display:block}

.block{margin-bottom:6px;border-radius:var(--radius-md);overflow:hidden;border:1px solid transparent;transition:all 0.15s}
.block.match{border-color:rgba(46,163,95,0.25);background:rgba(46,163,95,0.04)}
.block-head{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;user-select:none;border-radius:var(--radius-md)}
.block-head:hover{background:var(--surface-hover)}
.block-arrow{display:flex;align-items:center;flex-shrink:0;transition:transform 0.15s}
.block-arrow svg{width:12px;height:12px;stroke:var(--text-secondary);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.block.open .block-arrow{transform:rotate(90deg)}
.block-title{flex:1;font-size:0.88rem;font-weight:500; color:var(--text-secondary)}
.block-badge{font-size:0.7rem;padding:1px 8px;border-radius:var(--radius-pill);background:rgba(255,215,0,0.15);color:#ffd700;flex-shrink:0}
.block-body{display:none;padding:4px 12px 10px 20px;font-size:0.88rem;line-height:1.6}
.block.open .block-body{display:block}
.block-body p{margin:0 0 0.2rem}
.block-body ul,.block-body ol{margin:0 0 0.4rem;padding-left:1.3rem}
.block-body li{margin:2px 0;line-height:1.4}
.block-body li::marker{color:rgba(224,224,224,0.4)}
.block-body ol li::marker{font-weight:500}
.block-body table{width:100%;border-collapse:collapse;margin:0.5rem 0;font-size:0.82rem;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.block-body th{background:rgba(128,128,128,0.25);font-weight:600;padding:6px 10px;text-align:left}
.block-body td{padding:5px 10px;background:var(--surface-blur-alt);border-top:1px solid var(--border)}
.block-body code{background:var(--code-bg);color:var(--code-text);border-radius:4px;padding:0.15em 0.4em;font-size:0.82em;font-family:var(--font-mono)}
.block-body strong{color:#fff}
.bilingual-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.bilingual-cols .col-en,.bilingual-cols .col-zh{min-width:0}
.col-label{font-size:0.62rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.lang-label{font-size:0.65rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.8px;margin:0.5rem 0 0.2rem;padding:1px 0}
.lang-label:first-child{margin-top:0}
@media(max-width:600px){.bilingual-cols{grid-template-columns:1fr}}
.block-body blockquote{border-left:3px solid var(--accent);background:var(--surface-active);padding:0.4em 0.8em;margin:0.4em 0;border-radius:var(--radius-sm)}

mark.hl{background:rgba(255,215,0,0.45);color:var(--text-primary);border-radius:2px;padding:0 1px}

.loading{text-align:center;padding:80px 20px;color:var(--text-secondary)}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.err-box .icon{font-size:2.5rem;margin-bottom:12px}
.err-box p{margin:4px 0;font-size:0.9rem}
.err-box .cmd{display:inline-block;background:var(--surface-alt);padding:6px 14px;border-radius:6px;margin:4px;font-family:var(--font-mono);font-size:0.82rem}
.empty{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.fade-in{animation:fade-in 0.2s ease}
</style>
</head>

<div class="header-inner">
<div class="suggest-wrap">

<button class="btn active" id="btnZH"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10"/><path d="M12 2a15.3 15.3 0 00-4 10 15.3 15.3 0 004 10"/></svg> 中文</button>
<span class="status-bar">

</div>
</div>
</header>

<main class="main" id="main">

加密","encryption"],"加密":["encryption"],"firewall":["防火墙","firewall"],"防火墙":["firewall"],"phishing":["钓鱼攻击","phishing"],"钓鱼攻击":["phishing"],"malware":["恶意软件","malicious software"],"恶意软件":["malware","malicious software"],"ransomware":["勒索软件","ransomware"],"勒索软件":["ransomware"],"ddos":["分布式拒绝服务攻击","distributed denial of service"],"分布式拒绝服务攻击":["ddos","distributed denial of service"],"pilot":["试点","pilot study"],"试点":["pilot","pilot study"],"direct cutover":["直接切换","direct cutover"],"直接切换":["direct cutover"],"parallel conversion":["并行切换","parallel conversion"],"并行切换":["parallel conversion"],"phased conversion":["分阶段切换","phased conversion"],"分阶段切换":["phased conversion"],"change agent":["变革代理人","change agent"],"变革代理人":["change agent"],"user-designer communication gap":["用户-设计者沟通鸿沟","user-designer gap"],"用户-设计者沟通鸿沟":["user-designer communication gap","user-designer gap"],"data warehouse":["数据仓库","data warehouse"],"数据仓库":["data warehouse"],"data mining":["数据挖掘","data mining"],"数据挖掘":["data mining"],"text mining":["文本挖掘","text mining"],"文本挖掘":["text mining"],"web mining":["web挖掘","web mining"],"web挖掘":["web mining"],"disintermediation":["去中介化","disintermediation"],"去中介化":["disintermediation"],"long tail":["长尾","long tail"],"长尾":["long tail"],"bundling":["捆绑销售","bundling"],"捆绑销售":["bundling"],"versioning":["版本化","versioning"],"版本化":["versioning"],"bullwhip effect":["牛鞭效应","bullwhip effect"],"牛鞭效应":["bullwhip effect"],"push strategy":["推式策略","push strategy"],"推式策略":["push strategy"],"pull strategy":["拉式策略","pull strategy"],"拉式策略":["pull strategy"]},data:{"meta":{"source":"raw/content.md","generated":"2026-06-17T15:07:17.280Z"},"sessions":[{"id":"01","title":{"en":"Information Systems Overview","zh":"信息系统概述"},"ref":"ref/01.Introduction.pdf","blocks":[{"title":{"en":"Information Technology and Information Systems","zh":"信息技术与信息系统"},"body":{"en":"**Information Technology (IT)**: all the hardware and software that a firm needs to use in order to achieve its business objectives. IT generally consists of computing technology, networking (communication) technology, and data management and analytics technology.\n\n**Information System (IS)**: a set of interrelated components that collect, process, store, and distribute information to support decision making, coordination, and control. An IS helps managers and workers analyze problems, visualize complex subjects, and create new products.\n\n**Data vs. Information**:\n- `Data` are streams of raw facts.\n- `Information` is data shaped into meaningful form.\n\n**Functions of an Information System**:\nAn information system performs three basic activities—input, processing, and output—to produce the information organizations need. Feedback is output returned to appropriate people or activities in the organization to evaluate and refine input.\n\n**Management Information System (MIS)**:\n- Traditionally: IS that support middle-level management.\n- Generally: Systems built with IT that facilitate management excellence (i.e., MIS = IS).\n- Also refers to the disciplinary field that studies the construction, use, and impacts of information systems.\n","zh":"**信息技术（IT）**：企业为实现业务目标所需的所有硬件和软件。IT 通常包括计算技术、网络（通信）技术以及数据管理与分析技术。\n\n**信息系统（IS）**：一组相互关联的组件，用于收集、处理、存储和分发信息，以支持决策、协调和控制。IS 帮助管理者和员工分析问题、可视化复杂主题并创造新产品。\n\n**数据与信息**：\n- `数据` 是原始事实的流。\n- `信息` 是被赋予意义形态的数据。\n\n**信息系统的功能**：\n信息系统执行三项基本活动——输入、处理和输出——以产生组织所需的信息。反馈是返回给组织中适当人员或活动的输出，用于评估和优化输入。\n\n**管理信息系统（MIS）**：\n- 传统定义：支持组织中层管理的信息系统。\n- 一般定义：用信息技术构建、促进卓越管理的系统（即 MIS = IS）。\n- 也指研究信息系统的构建、使用和影响的学科领域。\n"},"page":12},{"title":{"en":"Dimensions of Information Systems","zh":"信息系统的维度"},"body":{"en":"An information system creates value for the firm as an organizational and management solution to challenges posed by the environment. Using IS effectively requires understanding three dimensions:\n\n**1. Organization**:\nIncludes people, structure, business processes, politics, and culture. Organizations have a hierarchy of authority: senior management → middle management → operational management → knowledge workers → data workers → production/service workers. Business functions include sales and marketing, human resources, finance and accounting, and manufacturing and production.\n\n**2. Management**:\nManagers set organizational strategy for responding to business challenges and act creatively to create new products/services or occasionally re-create the organization.\n\n**3. Technology**:\nIncludes computer hardware and software, data management and analytics technology, and networking/telecommunications technology. IT infrastructure provides the platform that the system is built on.\n","zh":"信息系统作为应对环境挑战的组织和管理解决方案，为企业创造价值。有效使用 IS 需要理解三个维度：\n\n**1. 组织**：\n包括人员、结构、业务流程、政治和文化。组织拥有权威层级：高层管理 → 中层管理 → 运营管理 → 知识工作者 → 数据工作者 → 生产/服务工作者。业务职能包括销售与市场、人力资源、财务与会计、制造与生产。\n\n**2. 管理**：\n管理者制定应对业务挑战的组织战略，并创造性地采取行动来创造新产品/服务，或偶尔重塑组织。\n\n**3. 技术**：\n包括计算机硬件和软件、数据管理与分析技术、网络/电信技术。IT 基础设施提供了系统构建的平台。\n"},"page":20},{"title":{"en":"Organizational Structures","zh":"组织结构类型"},"body":{"en":"**Mintzberg's Five Organizational Structures**:\n\n| Type | Description | Examples |\n|:---|:---|:---|\n| Entrepreneurial Structure | Young, small firm in fast-changing environment; simple structure managed by a single CEO | Small start-up |\n| Machine Bureaucracy | Large bureaucracy in slowly changing environment; standard products; centralized management | Midsize manufacturing firm |\n| Divisionalized Bureaucracy | Multiple machine bureaucracies producing different products, topped by central HQ | Large diversified firms |\n| Professional Bureaucracy | Knowledge-based; expertise-dependent; weak centralized authority | Law firms, hospitals, schools |\n| Adhocracy | Task force; rapidly changing environments; multidisciplinary teams; weak central management | Consulting firms |\n\n**Key Insight**: Organizations = Organizational Structures + Business Processes (类比：程序 = 数据结构 + 算法).\n","zh":"**明茨伯格的五种组织结构**：\n\n| 类型 | 描述 | 示例 |\n|:---|:---|:---|\n| 创业型结构 | 小型年轻企业，快速变化环境，由单一 CEO 管理 | 小型初创公司 |\n| 职能式层级结构 | 大型科层组织，缓慢变化环境，标准化产品，集中管理 | 中型制造企业 |\n| 事业部式层级结构 | 多个职能式层级结构组合，生产不同产品，统一由总部管理 | 大型多元化公司 |\n| 专业式层级结构 | 知识型组织，依赖专业知识，集中权力较弱 | 律所、医院、学校 |\n| 民主式结构 | 任务小组，快速响应变化，多学科团队，弱集中管理 | 咨询公司 |\n\n**关键洞察**：组织 = 组织结构 + 业务流程（类比：程序 = 数据结构 + 算法）。\n"},"page":26},{"title":{"en":"Examples of Functional Business Processes","zh":"职能业务流程示例"},"body":{"en":"| Function | Processes |\n|:---|:---|\n| Manufacturing & Production | Assembling the product, Checking for quality, Producing bills of materials |\n| Sales & Marketing | Identifying customers, Making customers aware of the product, Selling the product |\n| Finance & Accounting | Paying creditors, Creating financial statements, Managing cash accounts |\n| Human Resources | Hiring employees, Evaluating job performance, Enrolling employees in benefit plans |\n\nFulfilling a customer order involves a complex set of steps requiring close coordination of sales, accounting, and manufacturing functions.\n","zh":"| 职能 | 流程 |\n|:---|:---|\n| 制造与生产 | 组装产品、检查质量、生成物料清单 |\n| 销售与市场 | 识别客户、让客户了解产品、销售产品 |\n| 财务与会计 | 支付债权人、编制财务报表、管理现金账户 |\n| 人力资源 | 招聘员工、评估绩效、登记福利计划 |\n\n完成客户订单涉及一系列复杂步骤，需要销售、会计和制造职能的紧密协调。\n"},"page":27},{"title":{"en":"Organizational Impacts of Information Systems","zh":"信息系统对组织的影响"},"body":{"en":"IS can impact all features of an organization:\n\n| Feature | IS Impact |\n|:---|:---|\n| Goals (Strategy) | Support existing goals/strategy; Enable new goals/strategy |\n| Organizational Structure | Reinforce existing structure; Enable more efficient structure |\n| Business Processes | Increase efficiency of existing processes; Enable entirely new processes |\n| Organizational Politics | May cause changes and conflicts in power, resources, and order |\n| Organizational Culture | May threaten commonly held cultural assumptions |\n| Organizational Environments | Help sense and respond to environmental changes |\n\n**Considerations when building IS**:\n- Is the system aligned with the goals of the firm?\n- Does the system fit with the organizational structure? Is changing the structure beneficial?\n- How will business processes be changed?\n- What conflicts of interest, power, resources will arise?\n- Will the system threaten cultural assumptions?\n- How may the system sense and respond to environmental changes?\n","zh":"IS 可以影响组织的所有特征：\n\n| 特征 | IS 的影响 |\n|:---|:---|\n| 目标（战略） | 支持现有战略；促成新战略 |\n| 组织结构 | 巩固现有结构；促成更高效的结构 |\n| 业务流程 | 提高现有流程效率；促成全新流程 |\n| 组织政治 | 可能引发权力、资源和秩序的变革与冲突 |\n| 组织文化 | 可能挑战普遍认同的文化假设 |\n| 组织环境 | 帮助感知和响应环境变化 |\n\n**构建 IS 时需要考虑的问题**：\n- 系统是否与公司的目标一致？\n- 系统是否与组织结构匹配？改变结构是否有益？\n- 业务流程将如何改变？\n- 会产生哪些利益、权力、资源的冲突？\n- 系统是否会挑战组织文化假设？\n- 系统如何感知和响应组织环境的变化？\n"},"page":29},{"title":{"en":"The Emerging Digital Firm","zh":"新兴的数字化企业"},"body":{"en":"In a **fully digital firm**:\n- Significant business relationships are digitally enabled and mediated\n- Core business processes are accomplished through digital networks\n- Key corporate assets are managed digitally\n- Digital firms offer greater flexibility: **time shifting** and **space shifting**\n\nA digital firm has established interdependence between its ability to use IT and its ability to implement corporate strategies and achieve corporate goals.\n\n**Complementary Assets**: Investing in IT alone does not guarantee good returns. Firms need the right business model and complementary assets (organizational and management capital) — the organization and management dimensions are as important as the technology dimension.\n","zh":"在**完全数字化企业**中：\n- 重要的业务关系通过数字方式实现和协调\n- 核心业务流程通过数字网络完成\n- 关键企业资产通过数字方式管理\n- 数字化企业提供更大的灵活性：**时间转移**和**空间转移**\n\n数字化企业在其使用 IT 的能力与实施公司战略及实现公司目标的能力之间建立了相互依赖关系。\n\n**互补性资产**：仅靠 IT 投资不能保证良好回报。企业需要正确的业务模式和互补性资产（组织和管理资本）——组织和管理维度与技术维度同样重要。\n"},"page":34},{"title":{"en":"Strategic Business Objectives of Information Systems","zh":"信息系统的战略业务目标"},"body":{"en":"Firms invest heavily in IS to achieve six strategic business objectives:\n1. **Operational excellence**\n2. **New products, services, and business models**\n3. **Customer and supplier intimacy**\n4. **Improved decision making**\n5. **Competitive advantage**\n6. **Survival**\n","zh":"企业大力投资 IS 以实现六个战略业务目标：\n1. **运营卓越**\n2. **新产品、服务和业务模式**\n3. **客户与供应商亲密性**\n4. **改进决策**\n5. **竞争优势**\n6. **生存**\n"},"page":31},{"title":{"en":"Information Systems, Organizations, and Strategy","zh":"信息系统、组织与战略"},"body":{"en":"**What is an Organization?**\n- **Technical definition**: A formal social structure that processes resources from the environment to produce outputs; a formal legal entity with internal rules and procedures, as well as a social structure.\n- **Behavioral definition**: A collection of rights, privileges, obligations, and responsibilities that is delicately balanced over time through conflict and conflict resolution.\n\n**Features of Organizations**:\n- Goals (Strategy)\n- Organizational Structure\n- Business Processes\n- Organizational Politics\n- Organizational Culture\n- Organizational Environments\n\n**Porter's Competitive Forces Model**:\nFive competitive forces shape the fate of a firm:\n1. Traditional competitors\n2. New market entrants\n3. Substitute products and services\n4. Customers\n5. Suppliers\n\n**Strategies for Dealing with Competitive Forces**:\n- **Low-cost leadership**: Produce at lower prices (e.g., Walmart, Xiaomi)\n- **Product differentiation**: Enable new products/services, change customer experience (e.g., Google, Apple, DJI)\n- **Focus on market niche**: Specialize in a single market niche (e.g., Transsion, Pop Mart)\n- **Strengthen customer and supplier intimacy**: Develop strong ties and loyalty, increase switching costs (e.g., Toyota, SHEIN)\n\n**The Business Value Chain Model**:\nViews the firm as a series of activities that add value to products or services. Primary activities vs. support activities.\n","zh":"**什么是组织？**\n- **技术定义**：从环境处理资源以产生输出的正式社会结构；具有内部规则和程序以及社会结构的正式法律实体。\n- **行为定义**：在一段时间内通过冲突和冲突解决微妙平衡的权利、特权、义务和责任的集合。\n\n**组织特征**：\n- 目标（战略）\n- 组织结构\n- 业务流程\n- 组织政治\n- 组织文化\n- 组织环境\n\n**波特的竞争力量模型**：\n五种竞争力量决定了企业的命运：\n1. 传统竞争者\n2. 新市场进入者\n3. 替代产品和服务\n4. 客户\n5. 供应商\n\n**应对竞争力量的策略**：\n- **低成本领导**：以更低价格生产（如沃尔玛、小米）\n- **产品差异化**：创造新产品/服务，改变客户体验（如谷歌、苹果、大疆）\n- **聚焦市场利基**：专注于单一市场细分（如传音、泡泡玛特）\n- **加强客户与供应商亲密性**：建立牢固关系和忠诚度，提高转换成本（如丰田、希音）\n\n**业务价值链模型**：\n将企业视为一系列为产品或服务增加价值的活动。主要活动 vs. 支持活动。\n"},"page":36},{"title":{"en":"Types of Information Systems","zh":"信息系统的类型"},"body":{"en":"**Systems for Different Management Levels**:\n| Level | System Type | Description |\n|:---|:---|:---|\n| Senior Management | Executive Support Systems (ESS) | Address nonroutine decisions requiring judgment, evaluation, and insight |\n| Middle Management | Management Information Systems (MIS) + Decision Support Systems (DSS) | MIS provides reports on current performance; DSS supports nonroutine decision making |\n| Operational Management | Transaction Processing Systems (TPS) | Perform and record daily routine transactions |\n\n**Enterprise Applications**:\nSystems for linking the enterprise that span functional areas, execute business processes across the firm, and include all levels of management. Four major applications:\n- Enterprise Systems (ERP)\n- Supply Chain Management Systems (SCM)\n- Customer Relationship Management Systems (CRM)\n- Knowledge Management Systems (KMS)\n\n**E-business, E-commerce, and E-government**:\n- **E-business**: Use of digital technology and Internet to drive major business processes.\n- **E-commerce**: Subset of e-business; buying and selling goods and services through the Internet.\n- **E-government**: Using Internet technology to deliver information and services to citizens, employees, and businesses.\n","zh":"**不同管理层级的系统**：\n| 层级 | 系统类型 | 描述 |\n|:---|:---|:---|\n| 高层管理 | 主管支持系统（ESS） | 处理需要判断、评估和洞察的非例行决策 |\n| 中层管理 | 管理信息系统（MIS）+ 决策支持系统（DSS） | MIS 提供当前绩效报告；DSS 支持非例行决策 |\n| 运营管理 | 事务处理系统（TPS） | 执行和记录日常例行事务 |\n\n**企业应用系统**：\n连接企业的系统，跨越职能领域，跨整个公司执行业务流程，包括所有管理层级。四大主要应用：\n- 企业系统（ERP）\n- 供应链管理系统（SCM）\n- 客户关系管理系统（CRM）\n- 知识管理系统（KMS）\n\n**电子商务、电子商贸与电子政务**：\n- **电子商务（广义）**：使用数字技术和互联网驱动主要业务流程。\n- **电子商贸（狭义）**：电子商务的子集；通过互联网买卖商品和服务。\n- **电子政务**：使用互联网技术向公民、员工和企业提供信息和服务。\n"},"page":54},{"title":{"en":"Detailed Look: TPS, MIS, DSS, ESS","zh":"详解各层级系统"},"body":{"en":"**Transaction Processing Systems (TPS)**:\n- Serve operational managers and staff.\n- Perform and record daily routine transactions (e.g., sales order entry, payroll, shipping).\n- Allow managers to monitor status of operations and relations with external environment.\n- Serve predefined, structured goals and decision making.\n\n**Management Information Systems (MIS)**:\n- Serve middle management.\n- Provide reports on firm's current performance, based on data from TPS.\n- Provide answers to routine questions with predefined procedures.\n- Typically have little analytic capability.\n\n**Decision Support Systems (DSS)**:\n- Serve middle management.\n- Support nonroutine decision making (e.g., \"What is the impact on production schedule if December sales doubled?\").\n- May use external information as well as TPS/MIS data.\n\n**Executive Support Systems (ESS)**:\n- Support senior management.\n- Address nonroutine decisions requiring judgment, evaluation, and insight.\n- Incorporate external events (e.g., new tax laws, competitors) as well as summarized internal information.\n- Example: Digital dashboard with real-time view of firm's financial performance.\n","zh":"**事务处理系统（TPS）**：\n- 服务运营管理人员和一线员工。\n- 执行和记录日常例行事务（如销售订单录入、工资发放、发货）。\n- 使管理者能监控运营状态和与外部环境的关系。\n- 服务于预定义的结构化目标和决策。\n\n**管理信息系统（MIS）**：\n- 服务中层管理。\n- 基于 TPS 数据提供公司当前绩效报告。\n- 以预定义程序回答例行问题。\n- 通常分析能力有限。\n\n**决策支持系统（DSS）**：\n- 服务中层管理。\n- 支持非例行决策（如\"如果 12 月销售额翻倍，对生产计划有何影响？\"）。\n- 可使用外部信息和 TPS/MIS 数据。\n\n**主管支持系统（ESS）**：\n- 支持高层管理。\n- 处理需要判断、评估和洞察的非例行决策。\n- 整合外部事件（如新税法、竞争对手）和内部汇总信息。\n- 示例：实时显示公司财务绩效的数字仪表板。\n"},"page":55}]},{"id":"02","title":{"en":"IT Infrastructure in Business Contexts","zh":"业务环境中的 IT 基础设施"},"ref":"ref/02.IT_Infrastruture.pdf","blocks":[{"title":{"en":"Services Provided by IT Infrastructure","zh":"IT 基础设施提供的服务"},"body":{"en":"Main services provided by IT infrastructure include:\n- Computing services\n- Telecommunications (Networking) services\n- Data management services\n- AI services\n\nOther services include application software services, physical facilities management services, IT management services, IT standards services, IT education services, and IT research and development services.\n","zh":"IT 基础设施提供的主要服务包括：\n- 计算服务\n- 电信（网络）服务\n- 数据管理服务\n- 人工智能服务\n\n其他服务包括应用软件服务、物理设施管理服务、IT 管理服务、IT 标准服务、IT 教育服务以及 IT 研发服务。\n"},"page":6},{"title":{"en":"Technology Drivers of Infrastructure Evolution","zh":"基础设施演进的技术驱动因素"},"body":{"en":"Key technology drivers:\n- **Moore's Law**: Computing power doubles every 2 years.\n- **Law of Mass Digital Storage**: The amount of data being stored each year doubles.\n- **Metcalfe's Law**: The value or power of a network grows exponentially as a function of the number of network members.\n- **Declining communication costs and the Internet**: Exponential growth in the size of the Internet.\n- **Standards and network effects**: Specifications that establish product compatibility.\n","zh":"关键技术驱动因素：\n- **摩尔定律**：计算能力每两年翻一番。\n- **海量数字存储定律**：每年存储的数据量翻一番。\n- **梅特卡夫定律**：网络的价值或力量随网络成员数量的增加呈指数增长。\n- **通信成本下降与互联网**：互联网规模的指数级增长。\n- **标准与网络效应**：建立产品兼容性的规范。\n"},"page":8},{"title":{"en":"Trends in Computer Platforms and Software","zh":"计算机平台与软件趋势"},"body":{"en":"**Trends in Computer Platforms**:\n- Mobile Computing\n- Consumerization of IT\n- Quantum Computing\n- Virtualization\n- Cloud Computing\n- Green Computing\n- Power-saving Processors\n- GPU Computing\n\n**Trends in Computer Software**:\n- Linux and open source software\n- Software for the Web\n- Web services and service-oriented architecture (SOA)\n- Software outsourcing and cloud services\n- AI-empowered software\n","zh":"**计算机平台趋势**：\n- 移动计算\n- IT 消费化\n- 量子计算\n- 虚拟化\n- 云计算\n- 绿色计算\n- 节能处理器\n- GPU 计算\n\n**计算机软件趋势**：\n- Linux 和开源软件\n- Web 软件\n- Web 服务与面向服务的架构（SOA）\n- 软件外包与云服务\n- AI 赋能的软件\n"},"page":9},{"title":{"en":"Key Digital Networking Technologies","zh":"关键数字网络技术"},"body":{"en":"- **Client/Server Computing**: Distributed computing model where clients request services from servers.\n- **Packet Switching**: Data is broken into packets and transmitted over shared networks.\n- **TCP/IP Architecture**: The foundational protocol suite of the Internet.\n- **Convergence**: Telephone and computer networks converging into a unified digital network using Internet standards.\n- **Internet of Things (IoT)**: Sensors and connected devices/facilities.\n- **Decentralized Networks**: Peer-to-peer and agent-to-agent communication, beyond client/server.\n","zh":"- **客户机/服务器计算**：客户端向服务器请求服务的分布式计算模型。\n- **分组交换**：数据被分解为数据包并通过共享网络传输。\n- **TCP/IP 体系架构**：互联网的基础协议套件。\n- **融合**：电话网络和计算机网络使用互联网标准融合为统一的数字网络。\n- **物联网（IoT）**：传感器和连接的设备/设施。\n- **去中心化网络**：点对点和智能体间通信，超越客户机/服务器模式。\n"},"page":11},{"title":{"en":"Data, Analytics, and Intelligence","zh":"数据、分析与智能"},"body":{"en":"**Database Management Systems (DBMS)**:\nSoftware that permits an organization to centralize data, manage them efficiently, and provide access to stored data by application programs. A database is a collection of data organized to serve many applications efficiently by centralizing data and controlling redundant data.\n\n**Emerging Database Forms**:\n- **NoSQL (Non-relational databases)**: More flexible data model; data sets stored across distributed machines; easier to scale; handles large volumes of unstructured and structured data.\n- **Vector Databases**: Stores unstructured data (text, images, audio) as high-dimensional numerical arrays (embeddings) generated by neural networks. Executes semantic similarity search to find data with similar meaning. Functions as the critical \"long-term memory\" infrastructure for Generative AI, fundamentally powering Retrieval-Augmented Generation (RAG).\n- **Databases in the Cloud**: Examples include Aliyun RDS, Amazon AWS Database, Microsoft SQL Azure Database. Benefits: better response to real-time demand, low costs.\n\n**Information Utilization Levels**:\n- Data Warehouse: Stores current and historical data from many core operational transaction systems. Provides analysis and reporting tools.\n- Analytical Tools:\n  - Multidimensional data analysis (OLAP - Online Analytical Processing)\n  - Data mining (Associations, Sequences, Classification, Clustering, Forecasting)\n  - Text mining and Web mining\n\n**Large Language Models (LLM) in Business Contexts**:\n- **Prompt Engineering**: Connecting to general LLM services with well-designed prompts.\n- **Fine-tuning**: Customizing the LLM for a specific business context.\n- **Retrieval-Augmented Generation (RAG)**: Combining local knowledge with LLM services for contextualized information.\n- **Contextualized AI Agents**: For automatic services.\n","zh":"**数据库管理系统（DBMS）**：\n允许组织集中数据、高效管理数据并为应用程序提供对存储数据访问的软件。数据库是通过集中数据和控制冗余数据来高效服务多个应用程序的数据集合。\n\n**新兴数据库形式**：\n- **NoSQL（非关系型数据库）**：更灵活的数据模型；数据集存储在分布式机器上；更易扩展；处理大量非结构化和结构化数据。\n- **向量数据库**：将非结构化数据（文本、图像、音频）存储为神经网络生成的高维数值数组（嵌入向量）。执行语义相似性搜索以查找含义相似的数据。作为生成式 AI 的关键\"长期记忆\"基础设施，从根本上支持检索增强生成（RAG）。\n- **云端数据库**：例如阿里云 RDS、亚马逊 AWS 数据库、微软 SQL Azure 数据库。优势：更好响应实时需求，保持低成本。\n\n**信息利用层级**：\n- 数据仓库：存储来自多个核心运营事务系统的当前和历史数据。提供分析和报告工具。\n- 分析工具：\n  - 多维数据分析（OLAP - 联机分析处理）\n  - 数据挖掘（关联、序列、分类、聚类、预测）\n  - 文本挖掘和 Web 挖掘\n\n**业务环境中的大语言模型（LLM）**：\n- **提示词工程**：通过精心设计的提示连接到通用 LLM 服务。\n- **微调**：为特定业务环境定制 LLM。\n- **检索增强生成（RAG）**：结合本地知识与 LLM 服务以获取情境化信息。\n- **情境化 AI 智能体**：用于自动服务。\n"},"page":14},{"title":{"en":"Data Policy and Data Administration","zh":"数据政策与数据管理"},"body":{"en":"**Information Policy**: Specifies the organization's rules for sharing, disseminating, acquiring, standardizing, classifying, and inventorying information. (e.g., only selected HR members can change and view sensitive employee data.)\n\n**Data Administration**: Management group who establishes policies and procedures to manage data.\n\n**Data Governance**: Organizational structure that deals with policies and processes for managing availability, usability, integrity, and security of data.\n\n**Database Administration**: Management group who creates and maintains databases.\n","zh":"**信息政策**：规定组织共享、分发、获取、标准化、分类和清点信息的规则。（如只有选定的 HR 部门成员才能更改和查看敏感的雇员数据。）\n\n**数据管理部门**：制定管理数据政策和程序的管理团队。\n\n**数据治理结构**：处理数据可用性、可用性、完整性和安全性管理政策和流程的组织结构。\n\n**数据库管理部门**：创建和维护数据库的管理团队。\n"},"page":27},{"title":{"en":"Databases and the Web","zh":"数据库与 Web"},"body":{"en":"Many companies use the web to make internal databases available to customers or partners. **Typical Configuration — Multi-tier Server**:\n- **Web Server**: Handles HTTP requests from browsers/mobile apps.\n- **Application Server / Middleware / CGI Scripts**: Business logic layer.\n- **Database Server**: Hosts the DBMS.\n\n**Advantages**:\n- Ease of use of browser software.\n- Web interface requires few or no changes to the database.\n- Inexpensive to add web interface to existing systems.\n","zh":"许多公司使用 Web 向客户或合作伙伴提供内部数据库访问。**典型配置——多层服务器**：\n- **Web 服务器**：处理来自浏览器/移动应用的 HTTP 请求。\n- **应用服务器/中间件/CGI 脚本**：业务逻辑层。\n- **数据库服务器**：托管 DBMS。\n\n**优势**：\n- 浏览器软件易于使用。\n- Web 界面无需或仅需少量修改数据库。\n- 为现有系统添加 Web 界面成本低廉。\n"},"page":28},{"title":{"en":"OLAP: Multi-dimensional Operations","zh":"OLAP 多维分析操作"},"body":{"en":"**OLAP (Online Analytical Processing)** supports multidimensional data analysis, viewing data using multiple dimensions (e.g., product, pricing, cost, region, time period).\n\nKey operations on a **Data Cube**:\n| Operation | Description |\n|:---|:---|\n| Slice (切片) | Extract a single dimension slice from the cube |\n| Dice (切块) | Extract a sub-cube by selecting multiple dimensions |\n| Pivot (旋转) | Rotate the cube to view from different perspectives |\n| Drill Down (下钻) | Navigate from summary to detail (e.g., Year → Quarter → Month) |\n| Roll Up (上卷) | Aggregate from detail to summary (e.g., City → Province → Country) |\n","zh":"**OLAP（联机分析处理）**支持多维数据分析，使用多个维度查看数据（如产品、定价、成本、地区、时间段）。\n\n对**数据立方体**的关键操作：\n| 操作 | 描述 |\n|:---|:---|\n| 切片 | 从立方体中提取单个维度切片 |\n| 切块 | 通过选择多个维度提取子立方体 |\n| 旋转 | 旋转立方体从不同视角查看 |\n| 下钻 | 从汇总导航到明细（如 年→季→月） |\n| 上卷 | 从明细聚合到汇总（如 城市→省份→国家） |\n"},"page":30},{"title":{"en":"IT Governance and Investment","zh":"IT 治理与投资决策"},"body":{"en":"**IT Governance**: Who controls IT infrastructure? How should the IT department be organized? How are costs allocated between divisions and departments?\n\n**Making Wise Infrastructure Investments**:\n- Both under-investment and over-investment can hamper firm performance.\n- **Total Cost of Ownership (TCO) Model**: Analyze direct and indirect costs of owning hardware and software.\n- **Competitive Forces Model**: Evaluate strategic value of IT investments.\n- **Rent-versus-Buy Decision**: Insourcing, outsourcing, or cloud computing?\n","zh":"**IT 治理**：谁控制 IT 基础设施？IT 部门应如何组织？成本如何在各部门间分配？\n\n**做出明智的基础设施投资**：\n- 投资不足和过度投资都会损害公司绩效。\n- **总拥有成本（TCO）模型**：分析拥有硬件和软件的直接和间接成本。\n- **竞争力量模型**：评估 IT 投资的战略价值。\n- **租用-购买决策**：内部自建、外包还是云计算？\n"},"page":34},{"title":{"en":"Security and Availability","zh":"安全与可用性"},"body":{"en":"**Security**: Policies, procedures, and technical measures used to prevent unauthorized access, alteration, theft, or physical damage to information systems.\n\n**Availability**: Policies, procedures, and technical measures used to ensure system services and data resources are always accessible to authorized users.\n\n**Security Threats**:\n- Malicious software (Malware): Viruses, Worms, Trojan horses, Ransomware, Spyware, Keyloggers, Code injection (e.g., SQL injection, prompt injection)\n- Hackers and Computer Crime: System intrusion, Spoofing, Sniffing, Denial-of-Service (DoS/DDoS), Identity theft, Click fraud\n- Internal Threats: Employees\n- Software Vulnerability\n- Natural Disasters\n\n**Tools and Technologies for Security**:\n- Identity Management and Authentication (Passwords, Tokens, Smart cards, Biometric authentication, Two-factor authentication)\n- Firewalls\n- Intrusion Detection Systems\n- Antivirus Software\n- Encryption (Symmetric key, Asymmetric/Public key)\n- Public Key Infrastructure (PKI) and Digital Certificates\n- High-availability Systems: Redundancy and Backup\n\n**Organizational Framework for Security and Control**:\n- Information Systems Controls (General controls, Application controls)\n- Security Policy and Acceptable Use Policy (AUP)\n- Auditing and Risk Assessment\n- Disaster Recovery Planning and Business Continuity Planning\n","zh":"**安全性**：用于防止对信息系统的未授权访问、篡改、盗窃或物理损坏的策略、程序和技术措施。\n\n**可用性**：用于确保授权用户始终可访问系统服务和数据资源的策略、程序和技术措施。\n\n**安全威胁**：\n- 恶意软件：病毒、蠕虫、特洛伊木马、勒索软件、间谍软件、按键窃听器、代码注入（如 SQL 注入、提示注入）\n- 黑客与计算机犯罪：系统侵入、欺诈、嗅探、拒绝服务攻击（DoS/DDoS）、身份窃取、点击欺骗\n- 内部威胁：员工\n- 软件漏洞\n- 自然灾害\n\n**安全工具与技术**：\n- 身份管理与认证（密码、令牌、智能卡、生物特征认证、双因素认证）\n- 防火墙\n- 入侵检测系统\n- 杀毒软件\n- 加密（对称密钥加密、非对称/公钥加密）\n- 公钥基础设施（PKI）与数字证书\n- 高可用性系统：冗余与备份\n\n**安全与控制的组织框架**：\n- 信息系统控制（一般控制、应用控制）\n- 安全策略与可接受使用策略（AUP）\n- 审计与风险评估\n- 灾难恢复计划与业务连续性计划\n"},"page":41}]},{"id":"03","title":{"en":"Enterprise Applications","zh":"企业应用系统"},"ref":"ref/03.Enterprise_Applications.pdf","blocks":[{"title":{"en":"Enterprise Resource Planning (ERP)","zh":"企业资源计划"},"body":{"en":"**Evolution of Manufacturing System Management**:\n- **ROP (Reorder Point)**: Early inventory management method (1940s).\n- **MRP (Material Requirement Planning)**: Production planning, scheduling, and inventory control system to manage manufacturing processes. Solves: minimal completion time, minimal cost, maximal production using Bill of Materials (BOM).\n- **MRP II (Manufacturing Resource Planning)**: Method for effective planning of all resources directly related to production (Money, Manpower, Materials, production capacity). Adds \"what-if\" simulation.\n- **ERP (Enterprise Resource Planning)**: Business management software/system, usually a suite of integrated applications that collect, store, manage, and interpret data from many business activities including product planning, manufacturing, marketing and sales, inventory management, shipping and payment.\n\n**Key Features of ERP**:\n- Suite of integrated software modules and a common central database.\n- Collects data from many divisions of the firm for use in nearly all internal business activities.\n- Information entered in one process is immediately available for other processes.\n- Integration: Functional areas are integrated.\n- Centralization: Databases are centralized.\n\n**Major ERP Vendors**: SAP, Oracle (PeopleSoft), Microsoft, Sage, Epicor, Infor, Odoo (open source), Yonyou (用友), Kingdee (金蝶).\n\n**Implementation of ERP**:\n- Built around thousands of predefined business processes reflecting best practices.\n- To implement, firms: select functions, conduct Business Process Re-engineering (BPR), map business processes to software processes, use configuration tables for customizing.\n\n**Risks of ERP**:\n- Conflicts with business strategy (\"best practices\" may not be best for you)\n- Huge investments\n- Conflicts with organizational culture and politics (organizational resistance)\n- Changes in employee responsibilities\n- Loss of flexibility\n\n**Key Success Factors for Implementing ERP**:\n- Organization is prepared for change.\n- Initiative is seen as business imperative.\n- Executive leaders are active and visible in support.\n- Resources are available.\n- Good packaged system is used and customized.\n- Users are trained before implementation.\n- Stress the enterprise, not the system.\n- General manager acts as mediator.\n","zh":"**制造管理系统演进**：\n- **ROP（订货点法）**：早期库存管理方法（1940年代）。\n- **MRP（物料需求计划）**：用于管理制造过程的生产计划、调度和库存控制系统。解决：最小完成时间、最小成本、最大产量，使用物料清单（BOM）。\n- **MRP II（制造资源计划）**：有效规划所有与生产直接相关的资源（资金、人力、材料、生产能力）的方法。增加\"假设\"模拟。\n- **ERP（企业资源计划）**：企业管理软件/系统，通常是一套集成应用，从许多业务活动中收集、存储、管理和解释数据，包括产品规划、制造、营销与销售、库存管理、发货与支付。\n\n**ERP 的关键特征**：\n- 集成软件模块套件和公共中央数据库。\n- 从公司多个部门收集数据，供几乎所有内部业务活动使用。\n- 在一个过程中输入的信息立即可用于其他过程。\n- 集成：职能领域被整合。\n- 集中化：数据库被集中。\n\n**主要 ERP 供应商**：SAP、Oracle（PeopleSoft）、Microsoft、Sage、Epicor、Infor、Odoo（开源）、用友、金蝶。\n\n**ERP 的实施**：\n- 围绕成千上万个反映最佳实践的预定义业务流程构建。\n- 实施步骤：选择功能、进行业务流程重组（BPR）、将业务流程映射到软件流程、使用配置表进行定制。\n\n**ERP 的风险**：\n- 与业务战略冲突（\"最佳实践\"可能并非最适合你）\n- 巨额投资\n- 与组织文化和政治冲突（组织抵制）\n- 员工职责变化\n- 失去灵活性\n\n**ERP 实施的关键成功因素**：\n- 组织为变革做好准备。\n- 倡议被视为业务要务。\n- 高管领导积极且明显地支持。\n- 资源可用。\n- 使用和定制了良好的套件系统。\n- 实施前对用户进行培训。\n- 强调企业而非系统。\n- 总经理充当调解人。\n"},"page":6},{"title":{"en":"MRP Details and Evolution","zh":"MRP 详解与演进"},"body":{"en":"**MRP (Material Requirement Planning)** — three simultaneous objectives:\n1. **Material**: Ensure materials are available for production and products are available for delivery.\n2. **Requirement**: Maintain the lowest possible material and product levels in store.\n3. **Plan**: Plan manufacturing activities, delivery schedules, and purchasing activities.\n\n**Bill of Materials (BOM)**: A comprehensive list of parts, assemblies, and other materials required to create a product. MRP uses BOM to back-calculate from target → required inputs. Theoretic foundation: **Operations Research (OR, 运筹学)**.\n\n**Limitations of MRP**:\n- Focuses only on materials; assumes no constraints on production capacity, procurement, or manpower.\n- No cost information integrated.\n- Lack of capability to change based on feedback.\n- Poor data integrity (low quality data).\n\n**MRP II (Manufacturing Resource Planning)** improvements:\n- Addresses all resources: Money, Manpower, Materials, production capacity.\n- Adds operational planning in financial units.\n- Has simulation capability for \"what-if\" questions.\n\n**Why MRP II → ERP?** The ultimate goal is to maximize value (profit), not just optimize production. In an Abundance Economy (post-1990s/2000s), marketing, financing, procurement, logistics, sales, and HR become as important as production itself.\n","zh":"**MRP（物料需求计划）**——三个同步目标：\n1. **物料**：确保生产有料可用，产品可供交付。\n2. **需求**：维持尽可能低的物料和产品库存水平。\n3. **计划**：规划制造活动、交货日程和采购活动。\n\n**物料清单（BOM）**：创建产品所需的零件、组件和其他材料的综合清单。MRP 使用 BOM 从目标向后计算所需输入。理论基础：**运筹学（OR）**。\n\n**MRP 的局限性**：\n- 仅关注物料；假设生产能力、采购、人力无约束。\n- 通常不整合成本信息。\n- 缺乏根据反馈进行调整的能力。\n- 数据完整性差（数据质量低）。\n\n**MRP II（制造资源计划）的改进**：\n- 覆盖所有资源：资金、人力、材料、生产能力。\n- 新增财务单位的运营计划。\n- 具备\"假设\"问题的模拟能力。\n\n**为何 MRP II → ERP？** 企业终极目标是最大化价值（利润），而不仅仅是优化生产。在充裕经济（1990年代/2000年代之后）中，营销、融资、采购、物流、销售和 HR 变得与生产同等重要。\n"},"page":27},{"title":{"en":"Supply Chain Management (SCM)","zh":"供应链管理"},"body":{"en":"**Supply Chain Efficiency and Just-in-Time (JIT)**:\n- Supply chain inefficiencies can waste up to 25% of operating expenses.\n- **Just-in-Time (JIT) Strategy**: Components arrive exactly when needed; finished goods are shipped immediately after leaving the assembly line. Requirement: perfect information about customer demand.\n- Real-world uncertainty: demand uncertainty, supplier delivery delays, defective parts, production disruptions → need **safety stock** as a buffer.\n\n**VMI Classic Case — P&G and Walmart**:\n- 1980: Walmart's St. Louis store called P&G, requesting automatic continuous replenishment of Pampers on shelves.\n- P&G managers designed a connection between Walmart's inventory database and P&G's production warehouse database.\n- When shelves were nearly empty, the supplier automatically shipped goods with monthly payment settlement.\n- 1987: P&G expanded the system from Pampers to all products.\n- Walmart's benefit: saved approximately 20% of inventory holding costs.\n- P&G's benefit: real-time access to Walmart data, daily precise delivery matching forecasted sales, keeping inventory and stockouts at minimum levels.\n\n**Bullwhip Effect Reproduction — Beer Distribution Game Data**:\n\n| Scenario | Total Chain Cost | Cost Index | Demand Amplification (%) |\n|:---|:---|:---|:---|\n| Baseline Case | 3358 | 1.47 | 900 |\n| No Order Delay | 1944 | 0.85 | 500 |\n| No Intermediaries (Producer–Retailer) | 939 | 0.82 | 350 |\n| Producer Has Consumer Demand Data | 2295 | 1.01 | 425 |\n| All Stages Have Consumer Demand Data | 1293 | 0.57 | 200 |\n\n**Core Conclusion**: Information sharing and reducing intermediaries significantly mitigate the bullwhip effect.\n","zh":"**供应链效率与准时制**：\n- 供应链低效可浪费高达 25% 的运营费用。\n- **准时制（Just-in-Time, JIT）策略**：组件在需要时到达，成品在离开装配线后发货。条件：关于客户需求的完美信息。\n- 现实中的不确定性：需求不确定、供应商延迟发货、缺陷零件、生产中断 → 需要**安全库存**作为缓冲。\n\n**供应商管理库存（VMI）经典案例——宝洁与沃尔玛**：\n- 1980年：沃尔玛圣路易斯门店致电宝洁，请求自动持续补货货架上的帮宝适。\n- 宝洁经理设计了沃尔玛库存数据库与宝洁生产仓库数据库的连接。\n- 当货架几乎空时，供应商自动发货，每月结算付款。\n- 1987年：宝洁将系统从帮宝适扩展到所有产品。\n- 沃尔玛的收益：节省约 20% 的库存持有成本。\n- 宝洁的收益：实时获取沃尔玛数据，每天精准配送匹配预测销量，将库存和缺货控制在最低水平。\n\n**牛鞭效应复现——啤酒分销游戏数据**：\n\n| 情景 | 总链成本 | 成本指数 | 需求放大率(%) |\n|:---|:---|:---|:---|\n| 基准案例 | 3358 | 1.47 | 900 |\n| 无订单延迟 | 1944 | 0.85 | 500 |\n| 生产者-零售商间无中间商 | 939 | 0.82 | 350 |\n| 生产者可获取消费者需求数据 | 2295 | 1.01 | 425 |\n| 所有阶段可获取消费者需求数据 | 1293 | 0.57 | 200 |\n\n核心结论：信息共享和减少中间环节显著降低牛鞭效应。\n"},"page":31},{"title":{"en":"Push-Pull Strategy and Product Types","zh":"推拉策略与产品类型"},"body":{"en":"**Trade-off between Efficiency and Responsiveness**:\n| Product Type | Characteristics | Strategy |\n|:---|:---|:---|\n| Functional Products | Stable, predictable demand; long life cycles; low profit margins | Push (efficiency-focused) |\n| Innovative Products | Unpredictable demand; short life cycles; high variety; higher margins | Pull (responsiveness-focused) |\n\n**Decoupling Point (DP)**: The point in the supply chain where push transitions to pull. Early stages use push (aggregated forecasts), final stages use pull (actual customer demand for specific configurations).\n","zh":"**效率与响应性的权衡**：\n| 产品类型 | 特征 | 策略 |\n|:---|:---|:---|\n| 功能型产品 | 稳定可预测需求；长生命周期；低利润率 | 推式（效率导向） |\n| 创新型产品 | 不可预测需求；短生命周期；高品种；较高利润率 | 拉式（响应导向） |\n\n**解耦点（DP）**：供应链中从推式过渡到拉式的点。早期阶段使用推式（汇总预测），最终阶段使用拉式（实际客户需求用于特定配置）。\n"},"page":48},{"title":{"en":"Customer Relationship Management (CRM)","zh":"客户关系管理"},"body":{"en":"**CRM Definition**: An integrated system for identifying, acquiring, and maintaining customers; supporting and enhancing marketing, sales, and service. Captures and integrates customer data from all over the organization, consolidates and analyzes it, and distributes it to various systems and customer touch points.\n\n**Functional Types of CRM**:\n| Type | Description |\n|:---|:---|\n| Operational CRM | Customer-facing applications: sales force automation (SFA), call center and customer service support, marketing automation |\n| Analytical CRM | Based on data warehouses; analyzes customer data (OLAP, data mining) for customer lifetime value (CLTV) |\n| Collaborative CRM | Collects, organizes, and shares customer data across multiple teams; improves customer experience with unified messaging |\n\n**CRM Components**:\n- Sales: Sales prospect (lead) and contact information, sales quote generation.\n- Service: Assigning and managing customer service requests, web-based self-service.\n- Marketing: Capturing prospect and customer data, scheduling direct-marketing, cross-selling, up-selling, down-selling.\n\n**CRM Paradox (\"Dark side of CRM\")**: Treating customers differently (segmentation) may cause perceptions of unfairness, dissatisfaction, and mistrust (e.g., Amazon's dynamic pricing controversy).\n\n**Trends in CRM**:\n- Social media for inbound marketing: BestBuy's personalized customer service; Ford used text mining on tweets to help design SUV trunk features.\n- Cloud computing and SaaS-based CRM: e.g., Salesforce.com.\n- Mobile devices and IoT as data sources: EMC² helped Audi optimize car models based on GPS, braking data, driving habits; iQIYI used sequence mining on user click/drag data to edit shows.\n- Integration with ERP/SCM: enables Total Life Cycle Immersive Marketing.\n","zh":"**CRM 定义**：用于识别、获取和维护客户的集成系统；支持和增强营销、销售与服务。从整个组织捕获和集成客户数据，整合分析，并分发给各种系统和客户接触点。\n\n**CRM 的功能类型**：\n| 类型 | 描述 |\n|:---|:---|\n| 运营型 CRM | 面向客户的应用程序：销售自动化（SFA）、呼叫中心与客户服务支持、营销自动化 |\n| 分析型 CRM | 基于数据仓库；分析客户数据（OLAP、数据挖掘），计算客户生命周期价值（CLTV） |\n| 协作型 CRM | 跨多个团队收集、组织和共享客户数据；通过统一消息改善客户体验 |\n\n**CRM 组成部分**：\n- 销售：销售线索和联系信息、销售报价生成。\n- 服务：分配和管理客户服务请求、基于网页的自助服务。\n- 营销：捕获线索和客户数据、安排直销、交叉销售、升级销售、降级销售。\n\n**CRM 悖论（\"CRM 的黑暗面\"）**：区别对待客户（细分）可能导致不公平感、不满和不信任（如亚马逊的动态定价争议）。\n\n**CRM 趋势与实例**：\n- 社交媒体用于集客营销：BestBuy 的个性化客户服务；福特使用文本挖掘技术分析推文以辅助 SUV 后备箱设计。\n- 云计算和基于 SaaS 的 CRM：如 Salesforce.com。\n- 移动设备和物联网作为数据源：EMC² 帮助奥迪基于 GPS、制动数据、驾驶习惯等优化车型；爱奇艺基于用户点击和拖拽数据进行序列挖掘，将 2 小时节目剪辑为 30 分钟版本。\n- 与 ERP/SCM 集成：实现全生命周期沉浸式营销（Total Life Cycle Immersive Marketing）。\n"},"page":54}]},{"id":"04","title":{"en":"E-commerce, Knowledge Management, and Decision Making","zh":"电子商务、知识管理与决策"},"ref":"ref/04.eCommerce_KM_DM.pdf","blocks":[{"title":{"en":"Why E-commerce is Different","zh":"电子商务为何不同"},"body":{"en":"**Unique Features of E-commerce**:\n- Ubiquity: Marketspace is virtual; transaction costs reduced.\n- Global reach: Transactions cross cultural and national boundaries.\n- Universal standards: One set of technology standards (Internet standards).\n- Richness: Supports video, audio, and text messages.\n- Interactivity\n- Information density: Greater price and cost transparency; enables price discrimination.\n- Personalization/customization: Technology permits modification of messages/goods; algorithm curation.\n- Social technology: Promotes user content generation and social networking.\n\n**Digital Markets are Different**:\n- **Disintermediation**: Removing intermediary layers lowers final cost to customer.\n- **Two-sided Markets (Multi-sided platforms)**: Technology enables connecting different users to create value (e.g., Google, Taobao, Uber).\n\n**Digital Goods are Different**:\nDigital goods are goods that can be delivered over a digital network:\n- Information products (e-books, news, music, video)\n- Symbols and data records (tickets, financial instruments)\n- Services (messaging, business transactions, entertainment)\n\n**Properties of Digital Goods**:\n- Non-depletion (can be used infinitely)\n- Variable (can be customized)\n- Replicable (easy to copy)\n- Individualized value\n- Network externalities\n- Economy of scale (high fixed costs, near-zero marginal costs)\n\n**New Possibilities Enabled by Digital Goods**:\n- Personalization and Long-tail\n- Differential pricing\n- Bundling\n- New forms of value creation (two-sided markets)\n\n**The Long Tail**: In digital markets, the top 20% products bring 80% revenues, but the remaining 80% (the \"tail\") collectively can be just as profitable due to low storage and distribution costs.\n\n**Differential Pricing Strategies**:\n- Personalization (first-degree price discrimination)\n- Versioning (second-degree price discrimination)\n- Group pricing (third-degree price discrimination)\n\n**Bundling**: Selling multiple products together (e.g., Microsoft Office). Reasons: complementarity, competition for markets, reshaping demand curve.\n","zh":"**电子商务的独特特征**：\n- 普遍性：市场空间是虚拟的；交易成本降低。\n- 全球覆盖：交易跨越文化和国界。\n- 统一标准：一套技术标准（互联网标准）。\n- 丰富性：支持视频、音频和文本消息。\n- 交互性\n- 信息密度：更高的价格和成本透明度；实现价格歧视。\n- 个性化/定制化：技术允许修改消息/商品；算法策展。\n- 社交技术：促进用户内容生成和社交网络。\n\n**数字市场的不同之处**：\n- **去中介化**：移除中间层降低了客户的最终成本。\n- **双边市场（多边平台）**：技术使连接不同用户以创造价值成为可能（如谷歌、淘宝、Uber）。\n\n**数字商品的不同之处**：\n数字商品是可以通过数字网络交付的商品：\n- 信息产品（电子书、新闻、音乐、视频）\n- 符号和数据记录（票务、金融工具）\n- 服务（消息传递、商业交易、娱乐）\n\n**数字商品的特性**：\n- 无损耗性\n- 可变性\n- 可复制性\n- 个性化价值\n- 网络外部性\n- 规模经济性\n\n**数字商品带来的新可能性**：\n- 个性化和长尾\n- 区别定价\n- 捆绑销售\n- 新的价值创造形式（双边市场）\n\n**长尾理论**：在数字市场中，前20%的产品带来80%的收入，但由于存储和分销成本低，其余80%（\"长尾\"）的集合同样可以盈利。\n\n**区别定价策略**：\n- 个人化定价（一级价格歧视）\n- 版本化定价（二级价格歧视）\n- 团体定价（三级价格歧视）\n\n**捆绑销售**：将多个产品一起销售（如微软 Office）。原因：互补性、市场竞争、重塑需求曲线。\n"},"page":4},{"title":{"en":"E-commerce Business and Revenue Models","zh":"电子商务业务与收入模式"},"body":{"en":"**Types of E-commerce**:\n| Type | Description | Example |\n|:---|:---|:---|\n| B2C (Business-to-Consumer) | Selling products/services directly to consumers | Amazon, TMall, JD.com |\n| B2B (Business-to-Business) | Transactions between businesses | Alibaba.com, Ariba.com |\n| C2C (Consumer-to-Consumer) | Consumers selling to other consumers | eBay |\n| Hybrid | Mix of B2C and C2C | Taobao.com |\n\n**Business Models**:\nPortal, E-tailer, Content Provider, Transaction Broker, Market Creator, Service Provider, Community Provider.\n\n**Revenue Models**:\nAdvertising, Sales, Subscription, Free/Freemium, Transaction Fee, Affiliate.\n\n**Marketing Transformations**:\n- **Behavioral Targeting**: Using user behavior data to target ads.\n- **Social Commerce**: Commerce enabled by social networks.\n","zh":"**电子商务类型**：\n| 类型 | 描述 | 示例 |\n|:---|:---|:---|\n| B2C（企业对消费者） | 直接向消费者销售产品/服务 | 亚马逊、天猫、京东 |\n| B2B（企业对企业） | 企业间交易 | 阿里巴巴国际站 |\n| C2C（消费者对消费者） | 消费者向其他消费者销售 | eBay |\n| 混合型 | B2C 和 C2C 混合 | 淘宝网 |\n\n**业务模式**：\n门户、电子零售商、内容提供商、交易经纪人、市场创建者、服务提供商、社区提供商。\n\n**收入模式**：\n广告、销售、订阅、免费/免费增值、交易费、联盟佣金。\n\n**营销变革**：\n- **行为定位**：使用用户行为数据精准投放广告。\n- **社交电商**：通过社交网络实现的商务。\n"},"page":18},{"title":{"en":"Evolution of Internet Digital Platforms in China","zh":"中国互联网数字平台演化"},"body":{"en":"Four evolutionary stages:\n1. **Stage I (late 1990s ~ early 2000s)**: Four basic functional platforms developed in parallel (communication, content, commerce, social).\n2. **Stage II (~2005 ~ 2015)**: Fusion of communication and content — social media emerges (Weibo, WeChat).\n3. **Stage III (~2015 ~ now)**: Fusion of social media and commerce — social commerce (WeChat commerce, live-streaming commerce).\n4. **Stage IV (envisioned)**: Fusion of social commerce and supply chain coordination.\n","zh":"四个演化阶段：\n1. **第一阶段（90年代末~00年代初）**：四类基本功能平台并行发展（通讯、内容、商务、社交）。\n2. **第二阶段（~2005~2015）**：通讯与内容融合——社交媒体出现（微博、微信）。\n3. **第三阶段（~2015~至今）**：社交媒体与商务融合——社交电商（微信商务、直播电商）。\n4. **第四阶段（展望中）**：社交电商与供应链协调的融合。\n"},"page":21},{"title":{"en":"From Bundling to Subscription Economy","zh":"从捆绑到订阅经济"},"body":{"en":"**The Shift in Digital Economics**:\n- **Traditional Bundling**: Selling discrete products together to capture consumer surplus in a single transaction (e.g., buying a CD-ROM of Microsoft Office 2007).\n- **Subscription Economy**: Selling continuous access to a continuously updated platform (e.g., Microsoft 365, Adobe Creative Cloud, ChatGPT Plus).\n- **Core mechanism**: Still bundling — but in the *time dimension*.  \n- **Lock-in Effect & Switching Costs**: As users accumulate data and habits within a cloud ecosystem, leaving becomes prohibitively expensive.\n- **Democratization + Extraction**: Subscriptions lower the initial barrier but allow firms to extract greater total value over the customer lifetime.\n","zh":"**数字经济的转变**：\n- **传统捆绑**：将离散产品一起销售以在单次交易中获取消费者剩余（如购买一张 Microsoft Office 2007 CD-ROM）。\n- **订阅经济**：销售对持续更新平台的持续访问（如 Microsoft 365、Adobe Creative Cloud、ChatGPT Plus）。\n- **核心机制**：仍然是捆绑——但是在*时间维度*上。\n- **锁定效应与转换成本**：当用户在云生态系统中积累数据和习惯后，离开变得代价高昂。\n- **民主化 + 价值提取**：订阅降低了初始门槛，但使企业能够在整个客户生命周期中获取更大的总价值。\n"},"page":23},{"title":{"en":"Knowledge Management","zh":"知识管理"},"body":{"en":"**Enterprise-Wide KM Systems in Detail**:\n- **Enterprise Content Management (ECM)**: Help capture, store, retrieve, distribute, preserve documents and semi-structured knowledge. Include digital asset management systems.\n- **Collaboration & Social Tools**: Blogs, wikis, social networking tools.\n- **Learning Management Systems (LMS)**: For training and managing learning activities.\n- **Key Challenge**: Developing taxonomy; alternatives: tagging, search engines.\n- **Major Vendors**: Alfresco, Box Platform, Hyland OnBase, IBM Cloud Pak, iManage Work, Microsoft 365, and Chinese vendors.\n\n**Knowledge Work Systems & Technologies**:\n- **Knowledge Workers**: Researchers, designers, architects, scientists, engineers. Three key roles: ① keeping organization current in knowledge; ② serving as internal consultants; ③ acting as change agents.\n- **CAD (Computer-Aided Design)**: Creating engineering/architectural designs; 3D printing.\n- **VR/AR Systems**: Virtual and augmented reality for simulation and design.\n- **Collaboration Systems**: Document collaboration (Google Docs, Tencent Docs, Dropbox); Developer collaboration (GitHub, GitLab); Project management (Notion, Confluence).\n\n**Intelligent Techniques**:\n- **Capturing Expert Knowledge**: Rule-based (expert systems, fuzzy logic); Case-based (case-based reasoning).\n- **Discovering Knowledge**: Machine learning (neural networks, genetic algorithms, LLMs like ChatGPT, DeepSeek); Data mining (associations, sequences, classification, clustering, forecasting).\n- **Automating Tasks**: Intelligent agents — software that performs tasks autonomously on behalf of users.\n\n**LLMs in Knowledge Management**:\nFour current approaches: prompt engineering, fine-tuning, RAG (Retrieval-Augmented Generation), contextualized AI agents.\n\n**Challenges of LLMs in Knowledge Management**:\n- Hallucination: Generating plausible but factually incorrect information.\n- Data Privacy and Security: Risk of exposing sensitive corporate data.\n- Dynamic Access Control: RAG and AI agents must respect user role boundaries.\n- Cost and Maintenance: High computational costs, overhead of maintaining vector databases.\n","zh":"**企业级知识管理系统详解**：\n- **企业内容管理（ECM）系统**：帮助捕获、存储、检索、分发、保存文档和半结构化知识。包括数字资产管理系统。\n- **协作与社交工具**：博客、维基、社交网络工具用于沟通和协作。\n- **学习管理系统（LMS）**：用于培训员工和管理学习活动。\n- **关键挑战**：开发分类体系；替代方案：标签、搜索引擎。\n- **主要供应商**：Alfresco、Box Platform、Hyland OnBase、IBM Cloud Pak、iManage Work、Microsoft 365，以及国内厂商（天翎、天纵、鸿翼等）。\n\n**知识工作系统与技术**：\n- **知识工作者**：研究人员、设计师、架构师、科学家、工程师。三个关键角色：①保持组织在知识方面的先进性；②在其专业领域充当内部顾问；③作为变革代理人评估和推动变革项目。\n- **CAD（计算机辅助设计）**：创建工程/建筑设计；3D 打印。\n- **VR/AR 系统**：用于仿真和设计的虚拟/增强现实。\n- **协作系统**：文档协作（Google Docs、腾讯文档、Dropbox）；开发者协作（GitHub、GitLab）；项目管理（Notion、Confluence）。\n\n**智能技术**：\n- **捕捉专家知识**：基于规则（专家系统、模糊逻辑规则）；基于案例（基于案例的推理）。\n- **发现知识**：机器学习（神经网络、遗传算法、LLM如 ChatGPT、DeepSeek）；数据挖掘（关联、序列、分类、聚类、预测）。\n- **自动化任务**：智能自主体（代表用户自主执行任务的软件）。\n\n**知识管理中的 LLM**：\n四种当前方法：提示词工程、微调、RAG（检索增强生成）、情境化 AI 智能体。\n\n**LLM 在知识管理中的挑战**：\n- 幻觉：生成看似合理但事实错误的信息。\n- 数据隐私与安全：暴露敏感企业数据的风险。\n- 动态权限控制：RAG 和 AI 智能体必须尊重用户角色边界。\n- 成本与维护：高计算成本、维护向量数据库的开销。\n"},"page":27},{"title":{"en":"Decision Support and Business Intelligence","zh":"决策支持与商业智能"},"body":{"en":"**Types of Decisions**:\n| Type | Description |\n|:---|:---|\n| Structured | Repetitive and routine; definite procedure; can be automated (High-Velocity Automated Decision Making) |\n| Semistructured | Part of problem has clear-cut answer; IS provides analysis support |\n| Unstructured | Decision maker provides judgment, evaluation, insight; IS provides analysis support |\n\n**Four Kinds of Systems for Decision Support**:\n- Operational/Middle Management: MIS, DSS\n- Senior Management: ESS, GDSS (Group Decision Support Systems)\n\n**Business Intelligence (BI) and Analytics Capabilities**:\n- Production reports (predefined)\n- Parameterized reports (pivot tables)\n- Dashboards/scorecards\n- Ad hoc query/search/report creation\n- Drill down and roll up\n- Forecasts, scenarios, models\n\n**The Evolution of BI: Generative BI**:\n- From static dashboards to conversational analytics.\n- Natural Language Querying (Text-to-SQL).\n- AI Agents as data analysts (automated extraction, visualization, insight summarization).\n- Democratization of data: empowers non-technical managers.\n\n**Data-Driven vs. Model-Driven Decision Making**:\n- **Data-Driven (Traditional BI)**: Descriptive & Diagnostic. Output: dashboards, reports. Human role: processes visualized data. Limitation: backward-looking.\n- **Model-Driven (Modern AI/Agentic BI)**: Predictive & Prescriptive. Output: scenario simulations, algorithmic recommendations, autonomous actions. Human role: strategic oversight.\n","zh":"**决策类型**：\n| 类型 | 描述 |\n|:---|:---|\n| 结构化决策 | 重复性和例行性；有确定程序；可自动化（高速自动化决策） |\n| 半结构化决策 | 部分问题有明确答案；信息系统提供分析支持 |\n| 非结构化决策 | 决策者提供判断、评估和洞察；信息系统提供分析支持 |\n\n**用于决策支持的四类系统**：\n- 运营/中层管理：MIS、DSS\n- 高层管理：ESS、GDSS（群体决策支持系统）\n\n**商业智能（BI）与分析能力**：\n- 生产报告（预定义）\n- 参数化报告（数据透视表）\n- 仪表板/计分卡\n- 即席查询/搜索/报告创建\n- 下钻与上卷\n- 预测、情景、模型\n\n**BI 的演进：生成式 BI**：\n- 从静态仪表板到对话式分析。\n- 自然语言查询（Text-to-SQL）。\n- AI 智能体作为数据分析师（自动提取、可视化、洞察总结）。\n- 数据民主化：赋能非技术管理者。\n\n**数据驱动 vs. 模型驱动的决策**：\n- **数据驱动（传统 BI）**：描述性与诊断性。输出：仪表板、报告。人的角色：处理可视化数据。局限性：面向过去。\n- **模型驱动（现代 AI/智能体 BI）**：预测性与指导性。输出：情景模拟、算法推荐、自主行动。人的角色：战略监督。\n"},"page":43}]},{"id":"05","title":{"en":"Building and Managing Information Systems","zh":"信息系统的构建与管理"},"ref":"ref/05.Building_and_Managing_IS.pdf","blocks":[{"title":{"en":"Organizational Change and Business Process Redesign","zh":"组织变革与业务流程重组"},"body":{"en":"**Systems Development and Organizational Change** (from least to most disruptive):\n| Type | Description |\n|:---|:---|\n| Automation | Increases efficiency; replaces manual tasks |\n| Rationalization | Streamlines standard operating procedures (TQM, Six Sigma) |\n| Business Process Redesign (BPR) | Analyze, simplify, and redesign business processes; reorganize workflow, combine steps, eliminate repetition |\n| Paradigm Shifts | Rethink nature of business; define new business model; change nature of organization |\n\n**Business Process Management (BPM)**: Variety of tools and methodologies to analyze, design, and optimize processes.\n\n**Steps in BPR**:\n1. Identify processes for change\n2. Analyze existing processes\n3. Design the new process\n4. Implement the new process\n5. Continuous measurement\n","zh":"**系统开发与组织变革**（从影响最小到最大）：\n| 类型 | 描述 |\n|:---|:---|\n| 自动化 | 提高效率；替代手工任务 |\n| 合理化 | 简化标准操作程序（全面质量管理 TQM、六西格玛） |\n| 业务流程重组（BPR） | 分析、简化和重新设计业务流程；重组工作流、合并步骤、消除重复 |\n| 模式转换 | 重新思考业务本质；定义新业务模式；改变组织性质 |\n\n**业务流程管理（BPM）**：用于分析、设计和优化流程的各种工具和方法。\n\n**BPR 的步骤**：\n1. 识别需要改变的流程\n2. 分析现有流程\n3. 设计新流程\n4. 实施新流程\n5. 持续度量\n"},"page":4},{"title":{"en":"Core Activities in the Systems Development Process","zh":"系统开发过程的核心活动"},"body":{"en":"| Activity | Description |\n|:---|:---|\n| Systems Analysis | Identify problem(s), specify solutions, establish information requirements |\n| Systems Design | Create design specifications |\n| Programming | Translate design specifications into program code |\n| Testing | Unit testing, systems testing, acceptance testing |\n| Conversion | Plan conversion, prepare documentation, train users and technical staff |\n| Production and Maintenance | Operate the system, evaluate it, modify it |\n\n**Systems Analysis**:\n- Defining the problem, identifying causes, process modeling (as-is)\n- Specifying solutions, identifying information requirements, process modeling (to-be)\n- Feasibility study\n- Systems proposal report\n\n**Systems Design**:\n- Describes system specifications that will deliver functions identified during analysis.\n- Addresses all managerial, organizational, and technological components.\n- End-user involvement is critical.\n\n**Conversion Strategies**:\n| Strategy | Description |\n|:---|:---|\n| Parallel strategy | Old and new systems run simultaneously |\n| Direct cutover | Old system is stopped, new system started immediately |\n| Pilot study | New system introduced in one part of organization first |\n| Phased approach | New system introduced in stages |\n\n**Maintenance**:\n- 20% debugging and emergency work\n- 20% changes to hardware, software, data, reporting\n- 60% user enhancements, improving documentation, recoding for efficiency\n","zh":"| 活动 | 描述 |\n|:---|:---|\n| 系统分析 | 识别问题、指定解决方案、确定信息需求 |\n| 系统设计 | 创建设计规范 |\n| 编程 | 将设计规范转换为程序代码 |\n| 测试 | 单元测试、系统测试、验收测试 |\n| 切换 | 规划切换、准备文档、培训用户和技术人员 |\n| 生产与维护 | 运行系统、评估系统、修改系统 |\n\n**系统分析**：\n- 定义问题、识别原因、流程建模（现状）\n- 指定解决方案、确定信息需求、流程建模（未来）\n- 可行性研究\n- 系统建议报告\n\n**系统设计**：\n- 描述能够交付分析阶段识别出的功能的系统规范。\n- 处理所有管理、组织和技术组件。\n- 最终用户参与至关重要。\n\n**切换策略**：\n| 策略 | 描述 |\n|:---|:---|\n| 并行切换 | 新旧系统同时运行 |\n| 直接切换 | 旧系统停止，新系统立即启动 |\n| 试点研究 | 新系统首先在组织的某个部分引入 |\n| 分阶段切换 | 新系统分阶段引入 |\n\n**维护**：\n- 20% 调试和紧急工作\n- 20% 硬件、软件、数据、报告的变更\n- 60% 用户增强、改进文档、为效率重新编码\n"},"page":14},{"title":{"en":"Principal Methodologies and Approaches","zh":"主要方法论与开发方式"},"body":{"en":"**Methodologies (modeling and design methods)**:\n| Methodology | Description |\n|:---|:---|\n| Structured Methodologies | Step-by-step, progressive, process-oriented; separate data from processes; tools: ER diagram (ERD), Data Flow Diagram (DFD), Structure chart |\n| Object-Oriented Development | Combines data and processes into objects; based on classes and inheritance; reusable objects; UML industry standard |\n\n**Approaches (organizing core activities)**:\n| Approach | Description |\n|:---|:---|\n| Traditional Systems Life Cycle (SDLC) | Phased \"waterfall\" approach; formal stages; costly, time-consuming, inflexible |\n| Prototyping | Build experimental system rapidly for end users to evaluate; useful when requirements uncertain |\n| Application Software Packages | Save time and money; offer customization features |\n| End-User Development | Users develop simple systems with little help from specialists; rapid completion, high satisfaction, but risk of inadequate control |\n| Outsourcing | Cloud/SaaS providers or external vendors; risks include hidden costs and opening proprietary processes |\n\n**Computer-Aided Software Engineering (CASE)**: Software tools to automate development, reduce repetitive work (graphics facilities, screen/report generators, data dictionaries, code generators). Standard: UML.\n","zh":"**方法论（建模与设计方法）**：\n| 方法论 | 描述 |\n|:---|:---|\n| 结构化方法论 | 逐步、渐进、面向过程；将数据与过程分离；工具：ER 图（ERD）、数据流图（DFD）、结构图 |\n| 面向对象开发 | 将数据和过程组合成对象；基于类和继承；对象可复用；UML 行业标准 |\n\n**开发方式（组织核心活动）**：\n| 方式 | 描述 |\n|:---|:---|\n| 传统系统生命周期（SDLC） | 分阶段\"瀑布\"方法；正式阶段；成本高、耗时、不灵活 |\n| 原型开发 | 快速构建实验性系统供最终用户评估；需求不确定时有用 |\n| 应用软件包 | 节省时间和金钱；提供定制功能 |\n| 最终用户开发 | 用户在没有太多专家帮助的情况下开发简单系统；完成快、满意度高，但存在控制不足的风险 |\n| 外包 | 云/SaaS 提供商或外部供应商；风险包括隐藏成本和开放专有流程 |\n\n**计算机辅助软件工程（CASE）**：自动化开发、减少重复工作的软件工具（图形工具、屏幕/报告生成器、数据字典、代码生成器）。标准：UML。\n"},"page":21},{"title":{"en":"Managing Projects","zh":"项目管理"},"body":{"en":"**Selecting and Evaluating Information Systems Projects**:\n- Information systems plan supports overall business plan.\n- Portfolio analysis: Evaluate alternative projects; inventory all IS projects and assets; balance risk and return.\n\n**Costs and Benefits Analysis**:\n| Cost Type | Examples |\n|:---|:---|\n| Tangible Costs | Hardware, telecommunications, software, services, personnel |\n| Intangible Costs | Organizational disruptions |\n| Tangible Benefits | Increased productivity, lower operational costs, reduced workforce |\n| Intangible Benefits | More efficient customer service, enhanced decision making |\n\n**Capital Budgeting Models**:\n- Payback method\n- Accounting Rate of Return on Investment (ROI)\n- Net Present Value (NPV)\n- Internal Rate of Return (IRR)\n\n**Limitations of Financial Models**:\n- Focus on financial and technical aspects; overlook social and organizational dimensions.\n- Costs not considered: organizational disruptions.\n- Benefits not considered: intangible benefits such as more timely decisions.\n- TPS usually produce more measurable, tangible benefits; MIS, DSS, ESS produce more intangible benefits.\n\n**Information Systems Plan**: Typical structure — Purpose of the Plan, Strategic Business Plan Rationale, Current Systems, New Developments, Management Strategy, Implementation Plan, Budget Requirements.\n\n**Portfolio Analysis**: Evaluate alternative projects; inventory all IS projects and assets; balance risk and return. Information-intensive industries may include a few high-risk, high-benefit projects; non-information-intensive industries should focus on high-benefit, low-risk projects.\n\n**Dimensions of Project Risks**:\n- Project size (costs, time, number of units affected)\n- Project structure (structured requirements = lower risk)\n- Experience with technology\n\n**Change Management**:\n- Employee concerns about change\n- Resistance by key managers\n- Changing job functions, career paths, recruitment practices\n- User-designer communication gap (technical orientation vs. business problem orientation)\n- Change agent: Role of systems analyst to redefine configurations, interactions, job activities, and power relationships.\n\n**Controlling Risk Factors**:\n- Internal integration tools: Project leaders with technical/administrative experience, experienced team members, frequent meetings.\n- Formal planning and control tools: Gantt charts, PERT charts.\n- External integration tools: Link implementation team to users at all levels; fill user-designer communication gap.\n- Strategies to overcome user resistance: Participation, education, training, management edicts, incentives, improved interface, resolve organizational problems.\n","zh":"**选择和评估信息系统项目**：\n- 信息系统规划书支持整体业务计划。\n- 项目组合分析：评估替代项目；盘点所有 IS 项目和资产；平衡风险与回报。\n\n**成本与收益分析**：\n| 成本类型 | 示例 |\n|:---|:---|\n| 有形成本 | 硬件、电信、软件、服务、人员 |\n| 无形成本 | 组织混乱 |\n| 有形收益 | 提高生产力、降低运营成本、减少员工 |\n| 无形收益 | 更高效的客户服务、增强决策能力 |\n\n**资本预算模型**：\n- 回收期法\n- 投资回报率（ROI）\n- 净现值（NPV）\n- 内部收益率（IRR）\n\n**财务模型的局限性**：\n- 聚焦财务和技术层面，忽视社会和组织维度。\n- 未考虑成本：组织混乱。\n- 未考虑收益：无形收益（如更及时的决策）。\n- TPS 通常产生更多可量化收益；MIS、DSS、ESS 产生更多无形收益。\n\n**信息系统规划书**：典型结构——规划目的、战略业务计划依据、当前系统、新发展、管理策略、实施计划、预算需求。\n\n**项目组合分析**：评估替代项目；盘点所有 IS 项目和资产；平衡风险与回报。信息密集型行业可能包含少量高风险高回报项目；非信息密集型行业应聚焦高回报低风险项目。\n\n**项目风险维度**：\n- 项目规模（成本、时间、受影响单位数量）\n- 项目结构（结构化需求 = 较低风险）\n- 技术经验\n\n**变更管理**：\n- 员工对变革的担忧\n- 关键管理者的抵制\n- 工作职能、职业路径、招聘实践的变化\n- 用户-设计者沟通鸿沟（技术导向 vs. 业务问题导向）\n- 变革代理人：系统分析师重新定义配置、交互、工作活动和权力关系的角色。\n\n**控制风险因素**：\n- 内部集成工具：具有技术/行政经验的项目负责人、经验丰富的团队成员、频繁的团队会议。\n- 正式计划与控制工具：甘特图、PERT 图。\n- 外部集成工具：将实施团队与各级用户联系起来；填补用户-设计者沟通鸿沟。\n- 克服用户抵制的策略：参与、教育、培训、管理指令、激励措施、改进界面、解决组织问题。\n"},"page":31},{"title":{"en":"Information Systems Plan and Portfolio Analysis","zh":"信息系统规划与组合分析"},"body":{"en":"**Information Systems Plan**: Supports the overall business plan; strategic systems incorporated into top-level planning. Typical structure:\n- **Purpose of the Plan**: Overview, current and future organization, key business processes, management strategy.\n- **Strategic Business Plan Rationale**: Current situation, changing environments, major goals.\n- **Current Systems**: Major systems, infrastructure capabilities, difficulties, anticipated future demands.\n- **New Developments**: New system projects, new infrastructure capabilities.\n- **Management Strategy**: Acquisition plans, milestones, organizational realignment, training, personnel.\n- **Implementation Plan**: Anticipated difficulties, progress reports.\n- **Budget Requirements**: Requirements, potential savings, financing, acquisition cycle.\n\n**Portfolio Analysis**: Evaluate alternative projects; inventory all IS projects and assets; balance risk and return. Information-intensive industries (e.g., finance) may have a few high-risk, high-benefit projects; non-information-intensive industries should focus on high-benefit, low-risk projects.\n","zh":"**信息系统规划书**：支持整体业务计划；战略系统纳入顶层规划。典型结构：\n- **规划目的**：概述、当前和未来组织、关键业务流程、管理策略。\n- **战略业务计划依据**：当前形势、变化环境、主要目标。\n- **当前系统**：主要系统、基础设施能力、困难、预期未来需求。\n- **新发展**：新系统项目、新的基础设施能力。\n- **管理策略**：采购计划、里程碑和时间安排、组织调整、培训、人力资源策略。\n- **实施计划**：预期困难、进展报告。\n- **预算需求**：需求、潜在节约、融资、采购周期。\n\n**项目组合分析**：评估替代项目；盘点所有 IS 项目和资产；平衡风险与回报。信息密集型行业（如金融）可能包含少量高风险高回报项目；非信息密集型行业应聚焦高回报低风险项目。\n"},"page":34},{"title":{"en":"User-Designer Communication Gap","zh":"用户-设计者沟通鸿沟"},"body":{"en":"A major cause of IS project failure. IS specialists have a technical orientation; users prefer systems oriented to solving business problems.\n\n| User Concerns | Designer Concerns |\n|:---|:---|\n| Will the system deliver the information we need for our work? | What demands will this system put on our servers? |\n| Can we access the data on our iPhones, tablets, and PCs? | What kind of programming demands will this place on our group? |\n| What new procedures do we need to enter data into the system? | Where will the data be stored? What's the most efficient way to store them? |\n| How will the operation of the system change employees' daily routines? | What technologies should we use to secure the data? |\n\n**Change Agent**: The systems analyst's role is to bridge this gap, redefining the configurations, interactions, job activities, and power relationships of organizational groups.\n","zh":"IS 项目失败的主要原因之一。IS 专家倾向于技术导向的问题解决方式；用户偏好面向业务问题的系统。\n\n| 用户关注 | 设计者关注 |\n|:---|:---|\n| 系统能否提供我们工作所需的信息？ | 该系统对我们的服务器会有什么需求？ |\n| 我们能否在手机、平板和电脑上访问数据？ | 这会对我们团队的编程提出什么要求？ |\n| 我们需要什么新流程来录入数据？ | 数据该存在哪里？最高效的存储方式是什么？ |\n| 系统的运行将如何改变员工的日常惯例？ | 我们应该使用什么技术来保护数据？ |\n\n**变革代理人**：系统分析师的角色就是弥合这一鸿沟，重新定义组织群体的配置、交互、工作活动和权力关系。\n"},"page":38}]},{"id":"06","title":{"en":"Systems Analysis Fundamentals","zh":"系统分析基础"},"ref":"ref/06.Systems_Analysis (1).pdf","blocks":[{"title":{"en":"The Need for Systems Analysis and Design","zh":"系统分析与设计的必要性"},"body":{"en":"**Systems analysis and design** is the process to analyze, design, and implement improvements through the use of computerized information systems in support of users and the functioning of businesses.\n\nWhy is it needed?\n- To align systems (solutions) with business targets.\n- To structure and guide systems development, which is a costly endeavor.\n- To involve users.\n\n**Failure Case Examples**:\n- **Lidl's €500 Million SAP Disaster (2018)**: Inadequate requirements understanding (inventory at purchase prices vs. retail prices); refusal to re-engineer business processes; massive customizations that made the system slow and unstable.\n- **Moutai's Data Middle Platform Collapse (2020)**: Ignored organizational culture (agile platform vs. rigid SOE); over-centralization; excluded line-of-business managers from requirements gathering.\n- **MissFresh Supply-Chain Algorithm Bankruptcy (2022)**: Underestimated demand volatility and spoilage risks; no margin-aware cost modeling; prioritized technical feasibility over economic feasibility.\n","zh":"**系统分析与设计**是通过使用计算机化信息系统来分析、设计和实施改进以支持用户和企业运营的过程。\n\n为什么需要？\n- 使系统（解决方案）与业务目标对齐。\n- 构建和指导系统开发，这是一项成本高昂的工作。\n- 让用户参与。\n\n**失败案例**：\n- **Lidl 的 5 亿欧元 SAP 灾难（2018）**：需求理解不足（按采购价 vs. 零售价计算库存）；拒绝重新设计业务流程；大量定制导致系统缓慢和不稳定。\n- **茅台数据中台崩溃（2020）**：忽视组织文化（敏捷平台 vs. 僵化的国企）；过度集中化；排除了业务部门管理者的需求收集。\n- **每日优鲜供应链算法破产（2022）**：低估需求波动和损耗风险；没有考虑利润率的成本建模；技术可行性优先于经济可行性。\n"},"page":6},{"title":{"en":"Roles of the Systems Analyst","zh":"系统分析师的角色"},"body":{"en":"Three primary roles of the systems analyst:\n1. **Consultant**: \"I can tell you what to build.\"\n2. **Supporting Expert**: \"I'll help you build it right.\"\n3. **Agent of Change**: \"How can we make sure this gets done?\"\n\n**Qualities of a Systems Analyst**:\n- Problem solver\n- Communicator (bridges user-designer communication gap)\n- Strong personal and professional ethics\n- Self-disciplined and self-motivated\n","zh":"系统分析师的三个主要角色：\n1. **外部顾问**：\"我可以告诉你该构建什么。\"\n2. **内部专家**：\"我会帮你正确构建它。\"\n3. **变革代理人**：\"我们如何确保这件事完成？\"\n\n**系统分析师的素质**：\n- 问题解决者\n- 沟通者（弥合用户-设计者沟通鸿沟）\n- 强烈的个人和职业道德\n- 自律和自我驱动\n"},"page":13},{"title":{"en":"Development Methodologies","zh":"开发方法论"},"body":{"en":"**Three Major Development Methodologies**:\n1. **Systems Development Life Cycle (SDLC)**: Phased approach (waterfall). Phases: Identifying problems/opportunities/objectives → Determining information requirements → Analyzing system needs → Designing recommended system → Developing/documenting software → Testing/maintaining → Implementing/evaluating.\n2. **Agile Approach**: Iterative, incremental. Phases: Exploration → Planning → Iterations to first release → Productionizing → Maintenance. Scrum framework: sprints, product owner, Scrum Master.\n3. **Object-Oriented Systems Analysis and Design**: Uses UML (Unified Modeling Language). Objects combine data and processes; classes and inheritance for reusability.\n\n**CASE Tools**: Computer-Aided Software Engineering tools automate development (draw.io, Microsoft Visio, Lucidchart, Visual Paradigm, StarUML, Umbrello).\n","zh":"**三种主要开发方法论**：\n1. **系统生命周期法（SDLC）**：分阶段方法（瀑布）。阶段：识别问题/机会/目标 → 确定信息需求 → 分析系统需求 → 设计推荐系统 → 开发/文档化软件 → 测试/维护 → 实施/评估。\n2. **敏捷方法**：迭代式、增量式。阶段：探索 → 规划 → 首次发布迭代 → 产品化 → 维护。Scrum 框架：冲刺、产品负责人、Scrum 主管。\n3. **面向对象的系统分析与设计**：使用 UML（统一建模语言）。对象组合数据和过程；类和继承实现可复用性。\n\n**CASE 工具**：计算机辅助软件工程工具自动化开发（draw.io、Microsoft Visio、Lucidchart、Visual Paradigm、StarUML、Umbrello）。\n"},"page":19},{"title":{"en":"SDLC Phases in Detail","zh":"SDLC 各阶段详解"},"body":{"en":"**1. Identifying Problems, Opportunities, and Objectives**\n- Activity: Interview user management, summarize knowledge, estimate scope, document results.\n- Output: Feasibility report with problem definition and objective summaries.\n\n**2. Determining Information Requirements**\n- Activity: Interviewing, sampling, questionnaires, observe decision-maker's behavior/environment, prototyping. Learn the who, what, where, when, how, and why of the current system.\n- Output: Understanding of how users accomplish work; complete information on people, goals, data, and procedures.\n\n**3. Analyzing System Needs**\n- Activity: Create DFDs, complete data dictionary, analyze structured decisions, prepare system proposal.\n- Output: Recommendation on what should be done.\n\n**4. Designing the Recommended System**\n- Activity: Design data entry procedures, HCI, files/database, backup procedures.\n- Output: Model of the actual system.\n\n**5. Developing and Documenting Software**\n- Activity: Work with programmers to develop software; work with users to develop documentation (procedure manuals, online help, FAQ, ReadMe).\n- Output: Computer programs, system documentation.\n\n**6. Testing and Maintaining the System**\n- Activity: Test the IS; system maintenance; maintenance documentation.\n- Output: Problems identified, updated programs, documentation.\n\n**7. Implementing and Evaluating the System**\n- Activity: Train users, plan conversion, review and evaluate system.\n- Output: Trained personnel, installed system.\n","zh":"**1. 识别问题、机会与目标**\n- 活动：访谈用户管理、汇总知识、估算范围、记录结果。\n- 输出：包含问题定义和目标摘要的可行性报告。\n\n**2. 确定信息需求**\n- 活动：访谈、抽样、问卷、观察决策者行为与环境、原型开发。了解当前系统的 who, what, where, when, how, why。\n- 输出：理解用户如何完成工作；获得人员、目标、数据和流程的完整信息。\n\n**3. 分析系统需求**\n- 活动：创建 DFD、完善数据字典、分析结构化决策、准备系统建议书。\n- 输出：关于应如何处理的建议。\n\n**4. 设计推荐系统**\n- 活动：设计数据录入流程、人机界面、文件/数据库、备份流程。\n- 输出：实际系统的模型。\n\n**5. 开发与文档化软件**\n- 活动：与程序员协作开发软件；与用户协作编写文档（操作手册、在线帮助、FAQ、ReadMe）。\n- 输出：计算机程序、系统文档。\n\n**6. 测试与维护系统**\n- 活动：测试 IS；系统维护；维护文档。\n- 输出：识别的问题、更新的程序、文档。\n\n**7. 实施与评估系统**\n- 活动：培训用户、规划切换、审查和评估系统。\n- 输出：经过培训的人员、安装好的系统。\n"},"page":26},{"title":{"en":"Agile Approach Phases","zh":"敏捷方法各阶段"},"body":{"en":"**1. Exploration**: Assemble team, assess skills, examine potential technologies, experiment with us
